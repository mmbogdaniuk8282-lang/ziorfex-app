<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZIORFEX TITAN v12</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --neon: #00ff88; --bg: #050505; --panel: rgba(20, 20, 20, 0.95);
            --border: rgba(0, 255, 136, 0.2); --red: #ff3e3e; --text: #f0f0f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: 'Roboto Mono', monospace; background: var(--bg); color: var(--text); 
            margin: 0; padding: 15px; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
            background-image: radial-gradient(circle at 50% 0%, #0c2b1d 0%, #050505 100%);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 0.7rem; color: #666; }
        .status { display: flex; align-items: center; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .status-dot { width: 6px; height: 6px; background: var(--neon); border-radius: 50%; margin-right: 6px; animation: blink 1s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* PRICE DISPLAY */
        .price-section { text-align: center; margin-bottom: 25px; }
        #asset-name { font-family: 'Orbitron'; font-size: 0.9rem; color: #aaa; margin-bottom: 5px; }
        #live-price { font-family: 'Orbitron'; font-size: 2.8rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.1); }

        /* CONTROL PANEL */
        .controls { display: grid; gap: 12px; flex-grow: 1; }
        .field { background: var(--panel); border: 1px solid var(--border); padding: 12px 15px; border-radius: 12px; }
        .label { font-size: 0.6rem; color: var(--neon); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; display: block; }
        
        select {
            width: 100%; background: transparent; border: none; color: #fff;
            font-family: 'Roboto Mono'; font-size: 0.9rem; font-weight: 700; cursor: pointer;
        }

        /* ANALYZE BUTTON */
        .btn-container { margin-top: 20px; }
        .main-btn {
            width: 100%; background: var(--neon); color: #000; border: none;
            padding: 20px; border-radius: 15px; font-family: 'Orbitron'; font-weight: 900;
            text-transform: uppercase; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3); transition: 0.2s;
        }
        .main-btn:active { transform: scale(0.98); opacity: 0.8; }

        /* OVERLAY LOADING & RESULT */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader { width: 60px; height: 60px; border: 4px solid rgba(0,255,136,0.1); border-top: 4px solid var(--neon); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #res-dir { font-family: 'Orbitron'; font-size: 4rem; font-weight: 900; margin: 20px 0; }
        .accuracy { font-size: 1.2rem; color: var(--neon); margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="status"><span class="status-dot"></span> SYSTEM_READY</div>
        <div>MS: 24ms</div>
    </div>

    <div class="price-section">
        <div id="asset-name">EUR/USD (OTC)</div>
        <div id="live-price">1.08432</div>
    </div>

    <div class="controls">
        <div class="field">
            <span class="label">MARKET INSTRUMENT</span>
            <select id="asset-select" onchange="changeAsset()">
                <option value="EUR/USD (OTC)">EUR/USD (OTC)</option>
                <option value="GBP/USD (OTC)">GBP/USD (OTC)</option>
                <option value="USD/JPY (OTC)">USD/JPY (OTC)</option>
                <option value="BTC/USDT">BITCOIN (REAL)</option>
                <option value="ETH/USDT">ETHEREUM (REAL)</option>
            </select>
        </div>

        <div class="field">
            <span class="label">TIMEFRAME ANALYZE</span>
            <select id="tf-select">
                <option value="5">5 SEC (ULTRA FLASH)</option>
                <option value="15">15 SEC (FAST SCALP)</option>
                <option value="60" selected>1 MIN (STANDARD)</option>
                <option value="300">5 MIN (TITAN STABLE)</option>
            </select>
        </div>

        <div class="field">
            <span class="label">NEURAL ENGINE</span>
            <div style="font-size: 0.8rem; font-weight: 700;">MOMENTUM_ANALYTIC_PRO v4.0</div>
        </div>
    </div>

    <div class="btn-container">
        <button class="main-btn" onclick="runAnalysis()">ANALYZE MARKET</button>
    </div>

    <div id="overlay">
        <div id="loading-state">
            <div class="loader"></div>
            <p id="load-text" style="margin-top: 20px; color: var(--neon); letter-spacing: 2px; font-size: 0.7rem;">SCANNING LIQUIDITY...</p>
        </div>
        
        <div id="result-state" style="display: none; text-align: center;">
            <div id="res-icon" style="font-size: 5rem;">↑</div>
            <div id="res-dir">CALL</div>
            <div class="accuracy" id="res-acc">ACCURACY: 94.2%</div>
            <button class="main-btn" style="background: transparent; border: 1px solid var(--neon); color: var(--neon);" onclick="closeOverlay()">CLOSE</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentPrice = 1.08432;
        
        function changeAsset() {
            document.getElementById('asset-name').innerText = document.getElementById('asset-select').value;
        }

        function updatePrice() {
            let change = (Math.random() * 0.00010 - 0.00005).toFixed(5);
            currentPrice = (parseFloat(currentPrice) + parseFloat(change)).toFixed(5);
            document.getElementById('live-price').innerText = currentPrice;
            
            if(parseFloat(change) > 0) document.getElementById('live-price').style.color = "#00ff88";
            else document.getElementById('live-price').style.color = "#ff3e3e";
        }
        setInterval(updatePrice, 1000);

        async function runAnalysis() {
            tg.HapticFeedback.impactOccurred('heavy');
            const tf = document.getElementById('tf-select').value;
            
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('loading-state').style.display = 'flex';
            document.getElementById('result-state').style.display = 'none';

            let startPrice = currentPrice;
            
            // Ждем выбранное время (5, 15, 60 сек)
            let countdown = tf;
            const timer = setInterval(() => {
                countdown--;
                document.getElementById('load-text').innerText = `ANALYZING: ${countdown}s REMAINING`;
                if(countdown <= 0) clearInterval(timer);
            }, 1000);

            await new Promise(r => setTimeout(r, tf * 1000));
            
            let endPrice = currentPrice;
            showResult(startPrice, endPrice);
        }

        function showResult(p1, p2) {
            tg.HapticFeedback.notificationOccurred('success');
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('result-state').style.display = 'block';

            const isCall = p2 >= p1;
            const dir = document.getElementById('res-dir');
            const icon = document.getElementById('res-icon');
            const acc = 93.4 + (Math.random() * 5);

            if(isCall) {
                dir.innerText = "UP / CALL"; dir.style.color = "#00ff88";
                icon.innerText = "↑"; icon.style.color = "#00ff88";
            } else {
                dir.innerText = "DOWN / PUT"; dir.style.color = "#ff3e3e";
                icon.innerText = "↓"; icon.style.color = "#ff3e3e";
            }
            document.getElementById('res-acc').innerText = `ACCURACY: ${acc.toFixed(1)}%`;
        }

        function closeOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
