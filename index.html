<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZIORFEX NEURAL BLACK</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geo:wght@400;700&family=Orbitron:wght@900&family=JetBrains+Mono:wght@500;800&display=swap');
        
        :root {
            --neon: #00ffa3; --pink: #ff0055; --bg: #010102;
            --glass: rgba(255, 255, 255, 0.01);
            --border: rgba(0, 255, 163, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; padding: 15px; background: var(--bg); color: #fff;
            font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* Анімований фон "Нейромережа" */
        #neural-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.15; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-family: 'Orbitron'; font-size: 10px; color: var(--neon); letter-spacing: 5px; text-shadow: 0 0 15px var(--neon); }

        /* MONITOR з Тепловою картою */
        .monitor {
            background: rgba(0,0,0,0.8); border: 1px solid var(--border); border-radius: 35px;
            padding: 30px; backdrop-filter: blur(30px); text-align: center; margin-bottom: 20px;
            position: relative; overflow: hidden; box-shadow: 0 0 60px rgba(0,0,0,1);
        }
        #price { font-family: 'Geo', sans-serif; font-size: 68px; font-weight: 700; color: #fff; line-height: 1; }
        
        /* HEATMAP */
        .heatmap { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; margin-top: 15px; opacity: 0.4; }
        .cell { height: 4px; border-radius: 1px; background: #111; transition: 0.5s; }

        .u-label { font-size: 7px; color: var(--neon); text-transform: uppercase; margin: 10px 0 10px 15px; letter-spacing: 4px; font-weight: 800; }

        /* CARDS */
        .scroller { display: flex; gap: 15px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }
        .card {
            min-width: 140px; background: var(--glass); border: 1px solid rgba(255,255,255,0.03);
            padding: 22px; border-radius: 28px; text-align: center; transition: 0.4s;
        }
        .card.active { border-color: var(--neon); background: rgba(0, 255, 163, 0.05); transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 255, 163, 0.1); }

        /* BUTTON */
        .btn-black {
            width: 100%; padding: 28px; border-radius: 32px; border: none;
            background: #fff; color: #000; font-family: 'Orbitron'; font-weight: 900;
            font-size: 18px; cursor: pointer; margin-top: auto;
            box-shadow: 0 20px 40px rgba(255,255,255,0.1); transition: 0.3s;
        }
        .btn-black:active { transform: scale(0.95); background: var(--neon); }

        /* OVERLAY */
        #overlay {
            display: none; position: fixed; inset: 0; background: #000; z-index: 2000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .scan-line { width: 100%; height: 1px; background: var(--neon); position: absolute; box-shadow: 0 0 20px var(--neon); animation: v-scan 2s infinite; }
        @keyframes v-scan { 0% { top: 0; } 100% { top: 100%; } }

        #result { display: none; text-align: center; z-index: 2001; }
        #res-dir { font-family: 'Orbitron'; font-size: 110px; font-weight: 900; letter-spacing: -5px; }
        .acc-pill { padding: 10px 30px; border-radius: 50px; background: #111; color: var(--neon); font-size: 22px; font-weight: 800; border: 1px solid var(--border); margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

    <canvas id="neural-canvas"></canvas>

    <div class="header">
        <div class="logo">ZIORFEX // BLACK G5</div>
        <div style="font-size: 7px; letter-spacing: 2px;">V_STABLE_50.0</div>
    </div>

    <div class="monitor">
        <div id="price">0.91230</div>
        <div class="heatmap" id="heatmap"></div>
        <div style="font-size: 8px; color: var(--neon); margin-top: 15px; letter-spacing: 5px;">CLUSTER ANALYSIS ACTIVE</div>
    </div>

    <span class="u-label">Target Asset</span>
    <div class="scroller">
        <div class="card active" onclick="setAsset('AUD/CAD', this)">🌕 AUD/CAD</div>
        <div class="card" onclick="setAsset('EUR/USD', this)">🇪🇺 EUR/USD</div>
        <div class="card" onclick="setAsset('CRYPTO', this)">💎 CRYPTO</div>
    </div>

    <span class="u-label">Neural Expiration</span>
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
        <button class="card active" style="min-width: unset; padding: 15px 0;" onclick="setTF('5S', this)">5s</button>
        <button class="card" style="min-width: unset; padding: 15px 0;" onclick="setTF('15S', this)">15s</button>
        <button class="card" style="min-width: unset; padding: 15px 0;" onclick="setTF('30S', this)">30s</button>
        <button class="card" style="min-width: unset; padding: 15px 0;" onclick="setTF('1M', this)">1m</button>
    </div>

    <button class="btn-black" onclick="startDeepAnalysis()">АНАЛІЗУВАТИ</button>

    <div id="overlay">
        <div class="scan-line"></div>
        <div id="loading-txt" style="font-family:'Orbitron'; color:var(--neon); letter-spacing:15px; font-size:10px;">PROBING_MARKET</div>
        
        <div id="result">
            <div id="res-dir">CALL</div>
            <div class="acc-pill" id="res-acc">99.8%</div>
            <div style="margin-top:50px;"><button class="btn-black" style="width: 200px; background:transparent; border:1px solid #222; color:#fff;" onclick="location.reload()">BACK</button></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        
        // --- Heatmap Logic ---
        const hm = document.getElementById('heatmap');
        for(let i=0; i<40; i++) {
            let c = document.createElement('div'); c.className = 'cell'; hm.appendChild(c);
        }
        setInterval(() => {
            document.querySelectorAll('.cell').forEach(c => {
                const val = Math.random();
                c.style.background = val > 0.8 ? 'var(--neon)' : val > 0.6 ? 'var(--pink)' : '#111';
                c.style.boxShadow = val > 0.8 ? '0 0 5px var(--neon)' : 'none';
            });
            const p = (0.91200 + Math.random()*0.0015).toFixed(5);
            document.getElementById('price').innerText = p;
        }, 600);

        function setAsset(n, e) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            e.classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function setTF(v, e) {
            document.querySelectorAll('button.card').forEach(b => b.classList.remove('active'));
            e.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        async function startDeepAnalysis() {
            tg.HapticFeedback.impactOccurred('heavy');
            document.getElementById('overlay').style.display = 'flex';
            
            // Імітація серцебиття ринку через вібрацію (для S24 Ultra)
            let pulse = setInterval(() => { tg.HapticFeedback.impactOccurred('soft'); }, 400);

            await new Promise(r => setTimeout(r, 5000));
            clearInterval(pulse);

            document.getElementById('loading-txt').style.display = 'none';
            document.querySelector('.scan-line').style.display = 'none';
            document.getElementById('result').style.display = 'block';

            const win = 97.2 + Math.random() * 2.7;
            const isCall = Math.random() > 0.45;
            
            const rd = document.getElementById('res-dir');
            rd.innerText = isCall ? "CALL" : "PUT";
            rd.style.color = isCall ? "var(--neon)" : "var(--pink)";
            rd.style.textShadow = `0 0 70px ${isCall ? 'var(--neon)' : 'var(--pink)'}`;
            
            document.getElementById('res-acc').innerText = win.toFixed(1) + "%";
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
