<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZIORFEX TERMINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --neon: #00ff88; --bg: #050505; --card: #0f0f0f;
            --border: rgba(0, 255, 136, 0.2); --red: #ff3e3e; --text: #f0f0f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: 'Roboto Mono', monospace; background: var(--bg); color: var(--text); 
            margin: 0; padding: 12px; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* HEADER & STATUS */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .sys-info { font-size: 10px; color: #555; font-weight: 700; letter-spacing: 1px; }
        .status { color: var(--neon); text-shadow: 0 0 8px var(--neon); display: flex; align-items: center; }
        .dot { width: 6px; height: 6px; background: var(--neon); border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* PRICE DISPLAY */
        .price-box { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 15px;
            box-shadow: inset 0 0 20px rgba(0,255,136,0.05);
        }
        #asset-display { font-family: 'Orbitron'; font-size: 12px; color: #888; margin-bottom: 5px; }
        #price-display { font-family: 'Orbitron'; font-size: 32px; font-weight: 900; transition: 0.2s; }

        /* CONTROL GRID */
        .controls-grid { display: grid; gap: 10px; margin-bottom: 15px; }
        .control-item { background: var(--card); border: 1px solid #1a1a1a; padding: 10px 15px; border-radius: 12px; }
        .label { font-size: 9px; color: var(--neon); text-transform: uppercase; margin-bottom: 5px; display: block; }

        select {
            width: 100%; background: transparent; border: none; color: #fff;
            font-family: 'Roboto Mono'; font-size: 14px; font-weight: 700; cursor: pointer;
        }

        /* TIMEFRAME BUTTONS */
        .tf-container { display: flex; gap: 8px; margin-bottom: 15px; }
        .tf-btn {
            flex: 1; background: #111; border: 1px solid #222; color: #666;
            padding: 10px 0; border-radius: 8px; font-size: 11px; font-weight: 700;
            cursor: pointer; transition: 0.2s;
        }
        .tf-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,136,0.05); }

        /* ACTION BUTTON */
        .action-btn {
            width: 100%; background: var(--neon); color: #000; border: none;
            padding: 18px; border-radius: 15px; font-family: 'Orbitron'; font-weight: 900;
            font-size: 16px; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 255, 136, 0.2); transition: 0.2s;
            margin-top: auto;
        }
        .action-btn:active { transform: scale(0.97); }

        /* ANALYSIS OVERLAY */
        #overlay {
            display: none; position: fixed; inset: 0; background: var(--bg);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        .scanner { width: 100px; height: 100px; border: 2px solid var(--border); border-radius: 50%; position: relative; overflow: hidden; }
        .scanner::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--neon); box-shadow: 0 0 15px var(--neon); animation: scan 1.5s infinite linear; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        #res-dir { font-family: 'Orbitron'; font-size: 42px; font-weight: 900; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="header">
        <div class="sys-info">MS: 19ms | v13.0</div>
        <div class="status"><span class="dot"></span> POCKET_CONNECTED</div>
    </div>

    <div class="price-box">
        <div id="asset-display">EUR/USD (OTC)</div>
        <div id="price-display">1.08418</div>
    </div>

    <div class="controls-grid">
        <div class="control-item">
            <span class="label">Instrument</span>
            <select id="asset-select" onchange="updateAsset()">
                <option value="EUR/USD (OTC)">EUR/USD (OTC)</option>
                <option value="GBP/USD (OTC)">GBP/USD (OTC)</option>
                <option value="BTC/USDT">BITCOIN (REAL)</option>
                <option value="GOLD (OTC)">GOLD (XAU/USD)</option>
            </select>
        </div>
    </div>

    <span class="label" style="margin-left: 5px;">Timeframe Select</span>
    <div class="tf-container">
        <button class="tf-btn" onclick="setTF(5, this)">5s</button>
        <button class="tf-btn" onclick="setTF(15, this)">15s</button>
        <button class="tf-btn active" onclick="setTF(60, this)">1m</button>
        <button class="tf-btn" onclick="setTF(300, this)">5m</button>
    </div>

    <div class="control-item">
        <span class="label">AI Strategy</span>
        <div style="font-size: 13px; font-weight: 700;">VOLATILITY_SCALPER_PRO</div>
    </div>

    <button class="action-btn" onclick="startAnalysis()">Analyze Market</button>

    <div id="overlay">
        <div id="load-box" style="text-align: center;">
            <div class="scanner"></div>
            <p id="timer" style="margin-top:20px; color:var(--neon); font-size:12px;">SCANNING TREND...</p>
        </div>
        
        <div id="res-box" style="display:none; text-align:center; width: 100%;">
            <div id="res-dir">CALL</div>
            <p id="res-acc" style="color:var(--neon);">CONFIDENCE: 96.4%</p>
            <button class="action-btn" style="width:80%; margin-top:40px; background:transparent; border:1px solid #333; color:#fff;" onclick="closeAll()">Close</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentTF = 60;
        let price = 1.08418;

        function updateAsset() {
            document.getElementById('asset-display').innerText = document.getElementById('asset-select').value;
        }

        function setTF(val, el) {
            currentTF = val;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
        }

        // Fake Live Price
        setInterval(() => {
            let change = (Math.random() * 0.00012 - 0.00006);
            price = (parseFloat(price) + change).toFixed(5);
            const el = document.getElementById('price-display');
            el.innerText = price;
            el.style.color = change > 0 ? "#00ff88" : "#ff3e3e";
        }, 1000);

        async function startAnalysis() {
            tg.HapticFeedback.impactOccurred('heavy');
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('load-box').style.display = 'block';
            document.getElementById('res-box').style.display = 'none';

            let count = currentTF;
            const startPrice = price;
            
            const clock = setInterval(() => {
                count--;
                document.getElementById('timer').innerText = `ANALYZING: ${count}s`;
                if(count <= 0) clearInterval(clock);
            }, 1000);

            await new Promise(r => setTimeout(r, currentTF * 1000));
            
            showSignal(startPrice, price);
        }

        function showSignal(p1, p2) {
            tg.HapticFeedback.notificationOccurred('success');
            document.getElementById('load-box').style.display = 'none';
            document.getElementById('res-box').style.display = 'block';

            const isUp = p2 >= p1;
            const resDir = document.getElementById('res-dir');
            
            resDir.innerText = isUp ? "CALL ↑" : "PUT ↓";
            resDir.style.color = isUp ? "#00ff88" : "#ff3e3e";
            document.getElementById('res-acc').innerText = `CONFIDENCE: ${(92 + Math.random() * 6).toFixed(1)}%`;
        }

        function closeAll() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>

    <div id="overlay">
        <div id="loading-state">
            <div class="loader"></div>
            <p id="load-text" style="margin-top: 20px; color: var(--neon); letter-spacing: 2px; font-size: 0.7rem;">SCANNING LIQUIDITY...</p>
        </div>
        
        <div id="result-state" style="display: none; text-align: center;">
            <div id="res-icon" style="font-size: 5rem;">↑</div>
            <div id="res-dir">CALL</div>
            <div class="accuracy" id="res-acc">ACCURACY: 94.2%</div>
            <button class="main-btn" style="background: transparent; border: 1px solid var(--neon); color: var(--neon);" onclick="closeOverlay()">CLOSE</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentPrice = 1.08432;
        
        function changeAsset() {
            document.getElementById('asset-name').innerText = document.getElementById('asset-select').value;
        }

        function updatePrice() {
            let change = (Math.random() * 0.00010 - 0.00005).toFixed(5);
            currentPrice = (parseFloat(currentPrice) + parseFloat(change)).toFixed(5);
            document.getElementById('live-price').innerText = currentPrice;
            
            if(parseFloat(change) > 0) document.getElementById('live-price').style.color = "#00ff88";
            else document.getElementById('live-price').style.color = "#ff3e3e";
        }
        setInterval(updatePrice, 1000);

        async function runAnalysis() {
            tg.HapticFeedback.impactOccurred('heavy');
            const tf = document.getElementById('tf-select').value;
            
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('loading-state').style.display = 'flex';
            document.getElementById('result-state').style.display = 'none';

            let startPrice = currentPrice;
            
            // Ждем выбранное время (5, 15, 60 сек)
            let countdown = tf;
            const timer = setInterval(() => {
                countdown--;
                document.getElementById('load-text').innerText = `ANALYZING: ${countdown}s REMAINING`;
                if(countdown <= 0) clearInterval(timer);
            }, 1000);

            await new Promise(r => setTimeout(r, tf * 1000));
            
            let endPrice = currentPrice;
            showResult(startPrice, endPrice);
        }

        function showResult(p1, p2) {
            tg.HapticFeedback.notificationOccurred('success');
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('result-state').style.display = 'block';

            const isCall = p2 >= p1;
            const dir = document.getElementById('res-dir');
            const icon = document.getElementById('res-icon');
            const acc = 93.4 + (Math.random() * 5);

            if(isCall) {
                dir.innerText = "UP / CALL"; dir.style.color = "#00ff88";
                icon.innerText = "↑"; icon.style.color = "#00ff88";
            } else {
                dir.innerText = "DOWN / PUT"; dir.style.color = "#ff3e3e";
                icon.innerText = "↓"; icon.style.color = "#ff3e3e";
            }
            document.getElementById('res-acc').innerText = `ACCURACY: ${acc.toFixed(1)}%`;
        }

        function closeOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
