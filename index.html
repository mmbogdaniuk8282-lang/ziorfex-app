<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZIORFEX TRUTH ENGINE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        :root { --green: #00ff88; --red: #ff3366; --bg: #08080a; --surface: #111114; --border: #1c1c21; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; padding: 12px; background: var(--bg); color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* HEADER */
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        .sys-info { font-size: 8px; color: #444; letter-spacing: 2px; }

        /* REAL-TIME TERMINAL */
        .terminal {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 25px 15px; position: relative; margin-bottom: 15px;
        }
        #price { font-size: 52px; font-weight: 800; color: #fff; letter-spacing: -2px; text-align: center; display: block; }
        .market-status { font-size: 7px; color: var(--green); text-align: center; margin-top: 10px; opacity: 0.6; }

        /* NEURAL HISTORY (РЕАЛЬНІ СИГНАЛИ) */
        .history-box { background: rgba(255,255,255,0.02); border-radius: 10px; padding: 10px; margin-top: 15px; }
        .h-title { font-size: 7px; color: #333; margin-bottom: 8px; display: block; }
        .h-row { display: flex; justify-content: space-between; font-size: 9px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .h-row:last-child { border: none; }
        .h-win { color: var(--green); font-weight: 800; }

        .label { font-size: 8px; color: #444; text-transform: uppercase; margin: 10px 0 8px 5px; letter-spacing: 2px; }

        /* ASSET CARDS */
        .scroller { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .asset-card {
            min-width: 120px; background: var(--surface); border: 1px solid var(--border);
            padding: 15px; border-radius: 10px; text-align: center; transition: 0.2s;
        }
        .asset-card.active { border-color: var(--green); background: rgba(0,255,136,0.02); }
        .asset-card span { font-size: 10px; font-weight: 700; }

        /* TIME SELECT */
        .tf-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .tf-btn { background: var(--surface); border: 1px solid var(--border); color: #666; padding: 12px 0; border-radius: 8px; font-weight: 800; }
        .tf-btn.active { color: #fff; border-color: #444; }

        /* EXECUTION */
        .btn-run {
            width: 100%; padding: 24px; border-radius: 12px; border: none;
            background: #fff; color: #000; font-weight: 800; font-size: 16px;
            margin-top: auto; cursor: pointer;
        }
        .btn-run:active { transform: scale(0.98); background: var(--green); }

        /* ANALYSIS OVERLAY */
        #overlay {
            display: none; position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            flex-direction: column; padding: 40px 20px;
        }
        .log-stream { font-size: 9px; color: var(--green); line-height: 1.6; font-family: 'JetBrains Mono'; }

        #result { display: none; text-align: center; margin-top: auto; margin-bottom: auto; }
        #res-dir { font-size: 100px; font-weight: 800; line-height: 1; }
        .res-acc { font-size: 18px; color: #444; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">ZIORFEX_v110</div>
        <div class="sys-info" id="time-sync">SYNC: 10:44:02</div>
    </div>

    <div class="terminal">
        <span id="price">0.91230</span>
        <div class="market-status">● LIVE_MARKET_FEED_ENABLED</div>
        
        <div class="history-box">
            <span class="h-title">LAST_NEURAL_SESSIONS</span>
            <div class="h-row"><span>AUD/CAD</span><span class="h-win">CALL [SUCCESS]</span></div>
            <div class="h-row"><span>EUR/USD</span><span class="h-win">PUT [SUCCESS]</span></div>
            <div class="h-row"><span>CRYPTO</span><span class="h-win">CALL [SUCCESS]</span></div>
        </div>
    </div>

    <span class="label">Analysis Target</span>
    <div class="scroller">
        <div class="asset-card active" onclick="selA('AUD/CAD', this)"><span>AUD/CAD (OTC)</span></div>
        <div class="asset-card" onclick="selA('EUR/USD', this)"><span>EUR/USD (OTC)</span></div>
        <div class="asset-card" onclick="selA('BTC/USD', this)"><span>BITCOIN (L2)</span></div>
    </div>

    <span class="label">Timeframe</span>
    <div class="tf-grid">
        <button class="tf-btn active" onclick="selT(this)">5S</button>
        <button class="tf-btn" onclick="selT(this)">15S</button>
        <button class="tf-btn" onclick="selT(this)">30S</button>
        <button class="tf-btn" onclick="selT(this)">1M</button>
    </div>

    <button class="btn-run" onclick="startAnalysis()">INITIATE_SESSION</button>

    <div id="overlay">
        <div class="log-stream" id="logs"></div>
        <div id="result">
            <div id="res-dir">CALL</div>
            <div class="res-badge" style="color:var(--green); font-size:24px; font-weight:800;">99.12% CONFIRMED</div>
            <button class="btn-run" style="margin-top:80px; background:transparent; border:1px solid #222; color:#fff;" onclick="location.reload()">RESET_ENGINE</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        
        setInterval(() => {
            document.getElementById('price').innerText = (0.91200 + Math.random()*0.00110).toFixed(5);
            const now = new Date();
            document.getElementById('time-sync').innerText = `SYNC: ${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
        }, 1000);

        function selA(n, e) {
            document.querySelectorAll('.asset-card').forEach(c => c.classList.remove('active'));
            e.classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function selT(e) {
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            e.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        async function startAnalysis() {
            tg.HapticFeedback.impactOccurred('heavy');
            document.getElementById('overlay').style.display = 'flex';
            const logBox = document.getElementById('logs');
            
            const messages = [
                "> INITIALIZING NEURAL_LAYER_v11.4",
                "> CONNECTING TO LIQUIDITY_POOLS...",
                "> SCANNING RSI_MOMENTUM_DIVERGENCE",
                "> ANALYZING ORDER_FLOW_VOLUMES",
                "> CROSS-CHECKING CANDLE_PATTERNS",
                "> CONFIDENCE_LEVEL: 99.12%",
                "> GENERATING FINAL_SIGNAL..."
            ];

            for(let m of messages) {
                logBox.innerHTML += `<div>${m}</div>`;
                tg.HapticFeedback.impactOccurred('soft');
                await new Promise(r => setTimeout(r, 700));
            }

            logBox.style.display = 'none';
            document.getElementById('result').style.display = 'block';

            const isCall = Math.random() > 0.45;
            const rd = document.getElementById('res-dir');
            rd.innerText = isCall ? "CALL ↑" : "PUT ↓";
            rd.style.color = isCall ? "var(--green)" : "var(--red)";
            
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
