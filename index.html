<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOGDANIUK SIGNAL BOT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geo:wght@400;700&family=JetBrains+Mono:wght@500;800&display=swap');
        
        :root {
            --neon: #00ffaa; --pink: #ff0055; --bg: #030305; --text: #fff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 255, 170, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; padding: 10px; background: var(--bg); color: var(--text);
            font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* Сканер лінії */
        .noise { position: fixed; inset: 0; background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Noise_Texture.png'); opacity: 0.01; pointer-events: none; }
        
        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 5px; margin-bottom: 15px; }
        .logo { font-size: 11px; color: var(--neon); letter-spacing: 4px; font-weight: 800; text-transform: uppercase; }

        /* PRICE MONITOR - Відновлено як на скріншоті */
        .monitor {
            background: var(--glass); border: 1px solid var(--border); border-radius: 30px;
            padding: 25px; backdrop-filter: blur(20px); text-align: center; margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        #active-asset { font-size: 9px; color: #333; letter-spacing: 5px; margin-bottom: 8px; text-transform: uppercase; }
        
        /* ШРИФТ ЯК НА СКРІНШОТІ */
        #price { font-family: 'Geo', sans-serif; font-size: 58px; font-weight: 700; color: #fff; letter-spacing: -2px; }
        
        /* HFT MONITOR ЯК НА СКРІНШОТІ */
        .hft-meter { display: grid; grid-template-columns: repeat(20, 1fr); gap: 2px; height: 30px; align-items: flex-end; justify-content: center; margin-top: 15px; }
        .bar { width: 4px; background: var(--neon); border-radius: 1px; transition: height 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }

        .u-label { font-size: 8px; color: var(--neon); text-transform: uppercase; margin: 15px 0 10px 15px; letter-spacing: 3px; opacity: 0.4; }

        /* ASSET SCROLLER */
        .scroller { display: flex; gap: 12px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }
        .card {
            min-width: 120px; background: var(--glass); border: 1px solid rgba(255,255,255,0.05);
            padding: 18px; border-radius: 20px; text-align: center; font-size: 11px; font-weight: 800;
            color: #444; transition: 0.3s;
        }
        .card.active { border-color: var(--neon); color: #fff; background: rgba(0, 255, 170, 0.08); box-shadow: 0 0 20px rgba(0, 255, 170, 0.1); }
        .card i { display: inline-block; vertical-align: middle; margin-right: 5px; font-size: 14px; }

        /* EXPIRATION GRID */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .btn-tf {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.05); padding: 18px 0;
            border-radius: 18px; color: #444; font-weight: 900; font-size: 12px; transition: 0.3s;
        }
        .btn-tf.active { border-color: var(--neon); color: var(--neon); box-shadow: inset 0 0 10px rgba(0, 255, 170, 0.05); }

        /* MAIN BUTTON ЯК НА СКРІНШОТІ */
        .btn-main {
            width: 100%; padding: 26px; border-radius: 25px; border: none;
            background: linear-gradient(135deg, var(--neon), #00ccff);
            color: #000; font-weight: 900; font-size: 18px; text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0, 255, 170, 0.3); margin-top: auto;
            transition: transform 0.1s;
        }
        .btn-main:active { transform: scale(0.97); }

        /* OVERLAY результату (як у v40) */
        #overlay {
            display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .scan-line { width: 100%; height: 2px; background: var(--neon); position: absolute; top: 50%; transform: scaleX(0); transition: 5s linear; box-shadow: 0 0 25px var(--neon); }
        #overlay-loader { font-size: 12px; color: var(--neon); letter-spacing: 10px; text-transform: uppercase; font-family: 'Geo'; }
    </style>
</head>
<body>

    <div class="noise"></div>

    <audio id="snd-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
    <audio id="snd-process" loop src="https://www.soundjay.com/communication/sounds/data-transfer-1.mp3"></audio>
    <audio id="snd-success" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

    <div class="header">
        <div class="logo">NEURAL ULTIMATUM G5</div>
        <div style="font-size: 8px; color: var(--neon);">● CORE_CONNECTED</div>
    </div>

    <div class="monitor">
        <div id="active-asset">AUD/CAD (OTC)</div>
        <div id="price">0.91230</div>
        
        <div class="hft-meter" id="hft-meter"></div>
    </div>

    <span class="u-label">Neural Asset Scanner</span>
    <div class="scroller">
        <div class="card active" onclick="setAsset('AUD/CAD', this)"><i>🇦🇺</i>AUD/CAD</div>
        <div class="card" onclick="setAsset('EUR/USD', this)"><i>🇪🇺</i>EUR/USD</div>
        <div class="card" onclick="setAsset('GBP/JPY', this)"><i>🇬🇧</i>GBP/JPY</div>
        <div class="card" onclick="setAsset('CRYPTO', this)"><i>💎</i>CRYPTO</div>
    </div>

    <span class="u-label">Execution Time</span>
    <div class="grid">
        <button class="btn-tf active" onclick="setTF('5S', this)">5s</button>
        <button class="btn-tf" onclick="setTF('15S', this)">15s</button>
        <button class="btn-tf" onclick="setTF('30S', this)">30s</button>
        <button class="btn-tf" onclick="setTF('1M', this)">1m</button>
    </div>

    <button class="btn-main" onclick="runNeural()">АНАЛІЗУВАТИ ІМПУЛЬС</button>

    <div id="overlay">
        <div id="overlay-loader">DEEP_SCAN</div>
        <div class="scan-line" id="line"></div>
        <button class="btn-main" style="background:transparent; border:1px solid #111; color:#fff; width:220px; margin-top:100px; display:none;" id="back-btn" onclick="location.reload()">BACK</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let currentExp = '5S';
        
        // --- HFT METER як на скріншоті ---
        const meter = document.getElementById('hft-meter');
        for(let i=0; i<20; i++) {
            let b = document.createElement('div');
            b.className = 'bar';
            b.style.height = '10%';
            if(i % 3 === 0) b.style.background = 'var(--neon)';
            else if(i % 3 === 1) b.style.background = 'var(--pink)';
            else b.style.background = '#ff003c';
            meter.appendChild(b);
        }
        
        setInterval(() => {
            const bars = document.querySelectorAll('.bar');
            bars.forEach(b => { b.style.height = (Math.random()*90 + 10) + '%'; });
            const p = (0.91200 + Math.random()*0.00100).toFixed(5);
            document.getElementById('price').innerText = p;
        }, 800);

        // --- FUNCTIONS з v40 ---
        function setAsset(n, e) {
            document.getElementById('snd-click').play();
            document.getElementById('active-asset').innerText = n + " (OTC)";
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            e.classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function setTF(v, e) {
            document.getElementById('snd-click').play();
            currentExp = v;
            document.querySelectorAll('.btn-tf').forEach(b => b.classList.remove('active'));
            e.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        async function runNeural() {
            tg.HapticFeedback.impactOccurred('heavy');
            document.getElementById('snd-process').play();
            document.getElementById('overlay').style.display = 'flex';
            const line = document.getElementById('line');
            
            setTimeout(() => { line.style.transform = 'scaleX(1)'; }, 100);

            // Аналіз 5 секунд
            await new Promise(r => setTimeout(r, 5000));

            document.getElementById('snd-process').pause();
            document.getElementById('snd-success').play();
            document.getElementById('overlay-loader').innerText = (Math.random() > 0.5 ? "CALL ↑" : "PUT ↓");
            document.getElementById('overlay-loader').style.color = (document.getElementById('overlay-loader').innerText.includes("CALL") ? "var(--neon)" : "var(--pink)");
            
            line.style.display = 'none';
            document.getElementById('back-btn').style.display = 'block';
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
