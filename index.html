<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOGDANIUK SIGNAL PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --neon: #00ff88; --bg: #050505; --panel: rgba(15, 15, 15, 0.98);
            --border: rgba(0, 255, 136, 0.15); --red: #ff3e3e; --text: #f0f0f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Roboto Mono', monospace; background: var(--bg); color: var(--text); 
            margin: 0; padding: 15px; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
            background-image: radial-gradient(circle at 50% 10%, #0c2b1d 0%, #050505 100%);
        }

        /* API STATUS BAR */
        .api-bar {
            background: rgba(0,0,0,0.7); border: 1px solid var(--border);
            padding: 10px 15px; border-radius: 12px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.7rem; color: #666; font-weight: 700;
        }
        .status-dot { width: 8px; height: 8px; background: var(--neon); border-radius: 50%; box-shadow: 0 0 10px var(--neon); margin-right: 8px; }

        /* MAIN PRICE DISPLAY */
        .price-card {
            text-align: center; padding: 20px; border-radius: 20px;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
            border: 1px solid rgba(255,255,255,0.03); margin-bottom: 15px;
        }
        #live-asset { font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 2px; color: #888; margin-bottom: 10px; }
        #live-price { font-family: 'Orbitron'; font-size: 2.5rem; font-weight: 900; color: var(--red); transition: color 0.1s; }

        .card { 
            background: var(--panel); border-radius: 16px; padding: 15px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .label { font-size: 0.6rem; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; display: block; }
        .val { font-size: 0.85rem; color: #fff; font-weight: 700; }

        select {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 12px; border-radius: 8px; font-family: 'Roboto Mono'; font-size: 0.8rem;
            appearance: none; cursor: pointer;
        }

        .main-btn { 
            width: 100%; background: var(--neon); color: #000; border: none; 
            padding: 18px; border-radius: 16px; font-family: 'Orbitron', sans-serif;
            font-weight: 900; text-transform: uppercase; font-size: 1rem;
            margin-top: auto; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.2);
        }

        /* SIGNAL UI */
        #result-screen { display: none; text-align: center; flex-direction: column; height: 100%; }
        .signal-indicator {
            width: 100%; height: 160px; border-radius: 16px;
            margin: 20px 0; display: flex; flex-direction: column; justify-content: center;
            border: 1px solid var(--border); background: rgba(0,0,0,0.3); position: relative;
        }
        #r-dir { font-family: 'Orbitron'; font-size: 3rem; font-weight: 900; z-index: 2; }
        #r-icon { font-size: 3.5rem; z-index: 2; }

        /* LOAD ANIMATION */
        #loading { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .circle-loader { width: 50px; height: 50px; border: 3px solid rgba(0, 255, 136, 0.1); border-top-color: var(--neon); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="api-bar">
        <div style="display:flex; align-items:center;"><span class="status-dot"></span> POCKET_GATEWAY_v11</div>
        <div style="color:#444;">PING: 31ms</div>
    </div>

    <div class="price-card">
        <div id="live-asset">EUR/USD (OTC)</div>
        <div id="live-price">1.08415</div>
    </div>

    <div id="setup-screen" style="display: flex; flex-direction: column; height: 75%;">
        <div class="card">
            <span class="label">API CONNECTION</span>
            <div class="val">POCKETOPTION_STABLE_API v1.2</div>
        </div>
        <div class="card">
            <span class="label">NEURAL ENGINE</span>
            <div class="val">MOMENTUM_ANALYTIC_PRO</div>
        </div>
        
        <div class="card">
            <span class="label">TIME FRAME ANALYZE</span>
            <select id="tf-select">
                <option value="5">5 SEC (FLASH SCALP)</option>
                <option value="30">30 SEC (ULTRA SCALP)</option>
                <option value="60" selected>1 MIN (STANDARD)</option>
                <option value="300">5 MIN (TITAN STABLE)</option>
            </select>
        </div>
        
        <button class="main-btn" onclick="startPocketAnalysis()">GET POCKET SIGNAL</button>
    </div>

    <div id="loading">
        <div class="circle-loader"></div>
        <div style="margin-top:20px; font-size:0.7rem; color:var(--neon); letter-spacing:1px;" id="load-text">CONNECTING TO GATEWAY...</div>
    </div>

    <div id="result-screen">
        <div class="signal-indicator" id="s-ind">
            <span id="r-icon">↑</span>
            <span id="r-dir">CALL</span>
        </div>
        <div class="card">
            <span class="label">ANALYSIS COMPLETE</span>
            <div class="val" id="r-desc">5s FLASH TREND DETECTED</div>
        </div>
        <button class="main-btn" style="background:transparent; border:1px solid var(--border); color:#fff; margin-top:15px;" onclick="location.reload()">REFRESH ANALYTICS</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ІМІТАЦІЯ ТІКІВ (Для візуалу)
        let price = 1.08415;
        let history = [];
        function updatePrice() {
            price = (parseFloat(price) + (Math.random() * 0.00008 - 0.00004)).toFixed(5);
            document.getElementById('live-price').innerText = price;
            history.push(price);
            if(history.length > 20) history.shift();
        }
        setInterval(updatePrice, 800);

        async function startPocketAnalysis() {
            tg.HapticFeedback.impactOccurred('heavy');
            const tf = document.getElementById('tf-select').value;
            const tfText = document.getElementById('tf-select').options[document.getElementById('tf-select').selectedIndex].text;
            
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';

            // Реальна затримка таймфрейму (наприклад, 5 секунд)
            document.getElementById('load-text').innerText = `ANALYZING ${tfText}...`;
            
            // Записуємо ціну "ДО"
            const startPrice = price;
            
            // ЧЕКАЄМО ОБРАНИЙ ЧАС (Технічно правильно!)
            await new Promise(r => setTimeout(r, tf * 1000));
            
            // Записуємо ціну "ПІСЛЯ"
            const endPrice = price;

            showPocketSignal(startPrice, endPrice, tfText);
        }

        function showPocketSignal(p1, p2, tfName) {
            tg.HapticFeedback.notificationOccurred('success');
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';

            // РЕАЛЬНА ЛОГІКА НА ОСНОВІ РІЗНИЦІ ЦІН ЗА ЧАС
            const isCall = p2 >= p1;
            
            const dir = document.getElementById('r-dir');
            const icon = document.getElementById('r-icon');
            const ind = document.getElementById('s-ind');

            document.getElementById('r-desc').innerText = `${tfName} TREND DETECTED`;

            if(isCall) {
                dir.innerText = "UP / CALL"; icon.innerText = "↑";
                document.documentElement.style.setProperty('--neon', '#00ff88');
                dir.style.color = '#00ff88'; icon.style.color = '#00ff88';
                ind.style.borderColor = '#00ff88';
            } else {
                dir.innerText = "DOWN / PUT"; icon.innerText = "↓";
                document.documentElement.style.setProperty('--neon', '#ff3e3e');
                dir.style.color = '#ff3e3e'; icon.style.color = '#ff3e3e';
                ind.style.borderColor = '#ff3e3e';
            }
        }
    </script>
</body>
</html>
