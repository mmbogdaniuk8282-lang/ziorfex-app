<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZIORFEX PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700&display=swap');

        :root {
            --neon: #00ff88; --bg: #0a0a0a; --panel: #141414;
            --border: rgba(0, 255, 136, 0.15); --red: #ff3b3b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; 
            margin: 0; padding: 15px; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* TOP BAR */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .brand { font-family: 'Orbitron'; font-size: 14px; color: var(--neon); letter-spacing: 1px; font-weight: 900; }
        .ping { font-size: 10px; color: #444; font-weight: 700; }

        /* PRICE SECTION */
        .price-card {
            background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
            padding: 20px; text-align: center; margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #asset-name { font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        #live-price { font-family: 'Orbitron'; font-size: 36px; font-weight: 900; transition: color 0.2s; }

        /* CONTROLS */
        .section-label { font-size: 10px; color: var(--neon); text-transform: uppercase; margin: 10px 0 8px 5px; display: block; letter-spacing: 1px; }
        
        .selector-box { background: var(--panel); border: 1px solid #222; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        select { width: 100%; background: transparent; border: none; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }

        /* QUICK TIMEFRAME BUTTONS */
        .tf-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .tf-btn {
            background: #1a1a1a; border: 1px solid #333; color: #888;
            padding: 12px 0; border-radius: 10px; font-size: 12px; font-weight: 700;
            cursor: pointer; transition: 0.2s;
        }
        .tf-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0, 255, 136, 0.05); box-shadow: 0 0 15px rgba(0,255,136,0.1); }

        /* ANALYZE BUTTON */
        .main-btn {
            width: 100%; background: var(--neon); color: #000; border: none;
            padding: 22px; border-radius: 18px; font-family: 'Orbitron'; font-weight: 900;
            font-size: 18px; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 15px 35px rgba(0, 255, 136, 0.25); margin-top: auto;
        }
        .main-btn:active { transform: scale(0.96); }

        /* LOADING & RESULT OVERLAY */
        #overlay {
            display: none; position: fixed; inset: 0; background: var(--bg);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }
        .loader-circle { width: 80px; height: 80px; border: 3px solid rgba(0,255,136,0.1); border-top: 3px solid var(--neon); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #res-dir { font-family: 'Orbitron'; font-size: 52px; font-weight: 900; margin: 25px 0; text-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .res-info { font-size: 14px; color: #666; margin-bottom: 40px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">ZIORFEX TITAN</div>
        <div class="ping">PING: 21ms</div>
    </div>

    <div class="price-card">
        <div id="asset-name">EUR/USD (OTC)</div>
        <div id="live-price">1.08421</div>
    </div>

    <span class="section-label">Market Instrument</span>
    <div class="selector-box">
        <select id="asset-select" onchange="updateAsset()">
            <option value="EUR/USD (OTC)">EUR/USD (OTC)</option>
            <option value="GBP/USD (OTC)">GBP/USD (OTC)</option>
            <option value="BTC/USDT">BITCOIN (REAL)</option>
            <option value="XAU/USD (GOLD)">GOLD (XAU/USD)</option>
            <option value="ETH/USDT">ETHEREUM (REAL)</option>
        </select>
    </div>

    <span class="section-label">Fast Timeframe</span>
    <div class="tf-grid">
        <button class="tf-btn" onclick="setTF(5, this)">5s</button>
        <button class="tf-btn" onclick="setTF(15, this)">15s</button>
        <button class="tf-btn" onclick="setTF(30, this)">30s</button>
        <button class="tf-btn active" onclick="setTF(60, this)">1m</button>
    </div>

    <div class="selector-box" style="opacity: 0.6;">
        <span class="section-label" style="margin:0 0 5px 0;">Intelligence</span>
        <div style="font-size: 13px; font-weight: 700;">HFT_NEURAL_v4.2</div>
    </div>

    <button class="main-btn" onclick="startProcess()">Get Signal</button>

    <div id="overlay">
        <div id="load-view" style="text-align:center;">
            <div class="loader-circle"></div>
            <p id="timer" style="margin-top:25px; color:var(--neon); font-family:'Orbitron'; font-size:14px;">SCANNING...</p>
        </div>
        
        <div id="res-view" style="display:none; text-align:center; width:100%;">
            <div id="res-dir">CALL ↑</div>
            <div class="res-info">POWER: <span id="res-acc">94.8%</span> | EXPI: <span id="res-tf">5s</span></div>
            <button class="main-btn" style="background:transparent; border:1px solid #333; color:#fff;" onclick="reset()">Refresh</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentTF = 60;
        let price = 1.08421;

        function updateAsset() {
            document.getElementById('asset-name').innerText = document.getElementById('asset-select').value;
            tg.HapticFeedback.impactOccurred('medium');
        }

        function setTF(val, el) {
            currentTF = val;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        // Live Price Logic
        setInterval(() => {
            let drift = (Math.random() * 0.00014 - 0.00007);
            price = (parseFloat(price) + drift).toFixed(5);
            const pEl = document.getElementById('live-price');
            pEl.innerText = price;
            pEl.style.color = drift > 0 ? "#00ff88" : "#ff3b3b";
        }, 1000);

        async function startProcess() {
            tg.HapticFeedback.impactOccurred('heavy');
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('load-view').style.display = 'block';
            document.getElementById('res-view').style.display = 'none';

            const startPrice = price;
            let count = currentTF;
            
            const timer = setInterval(() => {
                count--;
                document.getElementById('timer').innerText = `ANALYZING: ${count}S`;
                if(count <= 0) clearInterval(timer);
            }, 1000);

            await new Promise(r => setTimeout(r, currentTF * 1000));
            
            showSignal(startPrice, price);
        }

        function showSignal(p1, p2) {
            tg.HapticFeedback.notificationOccurred('success');
            document.getElementById('load-view').style.display = 'none';
            document.getElementById('res-view').style.display = 'block';

            const isUp = p2 >= p1;
            const resDir = document.getElementById('res-dir');
            
            resDir.innerText = isUp ? "CALL ↑" : "PUT ↓";
            resDir.style.color = isUp ? "#00ff88" : "#ff3b3b";
            document.getElementById('res-acc').innerText = (91 + Math.random() * 7).toFixed(1) + "%";
            document.getElementById('res-tf').innerText = currentTF + "s";
        }

        function reset() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
