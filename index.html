<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZIORFEX TITAN PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800&display=swap');

        :root {
            --neon: #00ff88; --bg: #080808; --panel: #111111;
            --border: rgba(0, 255, 136, 0.12); --red: #ff3b3b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; 
            margin: 0; padding: 12px; height: 100vh; display: flex; flex-direction: column;
        }

        /* HEADER & LANG */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .lang-switch { display: flex; gap: 5px; }
        .lang-btn { 
            background: #1a1a1a; border: 1px solid #333; color: #555; 
            font-size: 10px; padding: 4px 8px; border-radius: 6px; cursor: pointer;
        }
        .lang-btn.active { color: var(--neon); border-color: var(--neon); }

        /* PRICE CARD */
        .price-card {
            background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
            padding: 15px; text-align: center; margin-bottom: 15px;
            box-shadow: inset 0 0 20px rgba(0,255,136,0.02);
        }
        #asset-display { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        #live-price { font-family: 'Orbitron'; font-size: 34px; font-weight: 900; }

        /* INPUT GROUPS */
        .label { font-size: 10px; color: var(--neon); text-transform: uppercase; margin: 8px 0 6px 4px; display: block; opacity: 0.8; }
        .box { background: var(--panel); border: 1px solid #222; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        select { width: 100%; background: transparent; border: none; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }

        /* TF GRID */
        .tf-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .tf-btn {
            background: #161616; border: 1px solid #222; color: #555;
            padding: 12px 0; border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer;
        }
        .tf-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0, 255, 136, 0.04); }

        /* ANALYZE BUTTON */
        .main-btn {
            width: 100%; background: var(--neon); color: #000; border: none;
            padding: 20px; border-radius: 16px; font-family: 'Orbitron'; font-weight: 900;
            font-size: 17px; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 255, 136, 0.2); margin-top: auto;
        }

        /* OVERLAY */
        #overlay {
            display: none; position: fixed; inset: 0; background: var(--bg);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        .scan-line { width: 80%; height: 2px; background: var(--neon); box-shadow: 0 0 15px var(--neon); position: relative; animation: scan 2s infinite ease-in-out; }
        @keyframes scan { 0%, 100% { transform: translateY(-50px); opacity: 0; } 50% { transform: translateY(50px); opacity: 1; } }
        
        #res-dir { font-family: 'Orbitron'; font-size: 48px; font-weight: 900; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="lang-switch">
            <div class="lang-btn active" onclick="setLang('ua', this)">UA</div>
            <div class="lang-btn" onclick="setLang('en', this)">EN</div>
            <div class="lang-btn" onclick="setLang('ru', this)">RU</div>
        </div>
        <div style="font-size: 9px; color: #444;">ID: 92842-X</div>
    </div>

    <div class="price-card">
        <div id="asset-display">EUR/USD (OTC)</div>
        <div id="live-price">1.08417</div>
    </div>

    <span class="label" id="l-instrument">Інструмент</span>
    <div class="box">
        <select id="asset-select" onchange="updateAsset()">
            <option value="EUR/USD (OTC)">EUR/USD (OTC)</option>
            <option value="AUD/CAD (OTC)">AUD/CAD (OTC)</option>
            <option value="GBP/USD (OTC)">GBP/USD (OTC)</option>
            <option value="USD/JPY (OTC)">USD/JPY (OTC)</option>
            <option value="BTC/USDT">BITCOIN (REAL)</option>
            <option value="XAU/USD (GOLD)">GOLD (XAU/USD)</option>
        </select>
    </div>

    <span class="label" id="l-timeframe">Таймфрейм</span>
    <div class="tf-grid">
        <button class="tf-btn active" onclick="setTF(5, this)">5s</button>
        <button class="tf-btn" onclick="setTF(15, this)">15s</button>
        <button class="tf-btn" onclick="setTF(60, this)">1m</button>
        <button class="tf-btn" onclick="setTF(300, this)">5m</button>
    </div>

    <div class="box" style="padding: 10px;">
        <span class="label" style="margin:0 0 5px 0;" id="l-strategy">Стратегія</span>
        <div style="font-size: 12px; font-weight: 700; color: #888;">VOLATILITY_SCALPER_PRO v5.0</div>
    </div>

    <button class="main-btn" onclick="run()" id="btn-main">Аналізувати</button>

    <div id="overlay">
        <div id="load-box" style="text-align:center; width:100%;">
            <div class="scan-line"></div>
            <p id="timer" style="margin-top:40px; color:var(--neon); font-family:'Orbitron'; font-size:12px;">SCANNING MARKET...</p>
        </div>
        <div id="res-box" style="display:none; text-align:center;">
            <div id="res-dir">CALL ↑</div>
            <p style="color:#666; font-size:12px;" id="res-info">Точність: 94.2%</p>
            <button class="main-btn" style="background:transparent; border:1px solid #333; color:#fff; width:200px; margin-top:30px;" onclick="reset()" id="btn-close">Закрити</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentTF = 5;
        let price = 1.08417;
        const translations = {
            ua: { instrument: "Інструмент", timeframe: "Таймфрейм", strategy: "Стратегія", analyze: "Аналізувати", close: "Закрити", scanning: "Сканування...", accuracy: "Точність" },
            en: { instrument: "Instrument", timeframe: "Timeframe", strategy: "Strategy", analyze: "Analyze", close: "Close", scanning: "Scanning...", accuracy: "Accuracy" },
            ru: { instrument: "Инструмент", timeframe: "Таймфрейм", strategy: "Стратегия", analyze: "Анализировать", close: "Закрыть", scanning: "Сканирование...", accuracy: "Точность" }
        };

        function setLang(lang, el) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const t = translations[lang];
            document.getElementById('l-instrument').innerText = t.instrument;
            document.getElementById('l-timeframe').innerText = t.timeframe;
            document.getElementById('l-strategy').innerText = t.strategy;
            document.getElementById('btn-main').innerText = t.analyze;
            document.getElementById('btn-close').innerText = t.close;
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateAsset() {
            document.getElementById('asset-display').innerText = document.getElementById('asset-select').value;
            tg.HapticFeedback.impactOccurred('medium');
        }

        function setTF(val, el) {
            currentTF = val;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        setInterval(() => {
            let drift = (Math.random() * 0.00016 - 0.00008);
            price = (parseFloat(price) + drift).toFixed(5);
            const pEl = document.getElementById('live-price');
            pEl.innerText = price;
            pEl.style.color = drift > 0 ? "#00ff88" : "#ff3b3b";
        }, 1000);

        async function run() {
            tg.HapticFeedback.impactOccurred('heavy');
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('load-box').style.display = 'block';
            document.getElementById('res-box').style.display = 'none';

            let count = currentTF;
            const startPrice = price;
            const timer = setInterval(() => {
                count--;
                document.getElementById('timer').innerText = `ANALYZING: ${count}S`;
                if(count <= 0) clearInterval(timer);
            }, 1000);

            await new Promise(r => setTimeout(r, currentTF * 1000));
            
            const isUp = price >= startPrice;
            const resDir = document.getElementById('res-dir');
            resDir.innerText = isUp ? "CALL ↑" : "PUT ↓";
            resDir.style.color = isUp ? "#00ff88" : "#ff3b3b";
            
            document.getElementById('load-box').style.display = 'none';
            document.getElementById('res-box').style.display = 'block';
            tg.HapticFeedback.notificationOccurred('success');
        }

        function reset() { document.getElementById('overlay').style.display = 'none'; }
    </script>
</body>
</html>
