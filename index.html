<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZIORFEX EXECUTIONER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geo:wght@400;700&family=Orbitron:wght@900&family=JetBrains+Mono:wght@500;800&display=swap');
        
        :root { --neon: #00ffaa; --pink: #ff0055; --bg: #000; --panel: #0a0a0c; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; padding: 12px; background: var(--bg); color: #fff;
            font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-family: 'Orbitron'; font-size: 10px; color: var(--neon); letter-spacing: 4px; }
        .status { font-size: 7px; color: #333; }

        /* MAIN MONITOR */
        .monitor {
            background: var(--panel); border: 1px solid #1a1a1c; border-radius: 25px;
            padding: 35px 15px; text-align: center; position: relative; margin-bottom: 15px;
        }
        #price { font-family: 'Geo', sans-serif; font-size: 74px; font-weight: 700; color: #fff; line-height: 1; letter-spacing: -3px; }
        
        /* CONFIDENCE METER */
        .conf-box { margin-top: 20px; padding: 0 30px; }
        .conf-label { font-size: 8px; color: #444; letter-spacing: 3px; margin-bottom: 8px; display: block; }
        .conf-bar { height: 2px; background: #111; border-radius: 10px; position: relative; }
        #conf-fill { position: absolute; height: 100%; width: 70%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: 0.8s ease; }

        .u-label { font-size: 8px; color: #444; text-transform: uppercase; margin: 10px 0 10px 10px; letter-spacing: 4px; }

        /* CARDS */
        .scroller { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; padding: 5px; }
        .scroller::-webkit-scrollbar { display: none; }
        .card {
            min-width: 135px; background: var(--panel); border: 1px solid #1a1a1c;
            padding: 22px; border-radius: 20px; text-align: center; transition: 0.3s;
        }
        .card.active { border-color: var(--neon); background: rgba(0,255,170,0.03); }
        .card span { font-size: 11px; font-weight: 800; color: #555; }
        .card.active span { color: #fff; }

        /* ACTION BUTTON */
        .btn-exe {
            width: 100%; padding: 28px; border-radius: 25px; border: none;
            background: #fff; color: #000; font-family: 'Orbitron'; font-weight: 900;
            font-size: 18px; margin-top: auto; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,255,255,0.05);
        }
        .btn-exe:active { transform: scale(0.96); background: var(--neon); }

        /* OVERLAY АНАЛІЗУ */
        #overlay {
            display: none; position: fixed; inset: 0; background: #000; z-index: 2000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .loader-txt { font-family: 'Orbitron'; font-size: 10px; color: var(--neon); letter-spacing: 12px; margin-bottom: 40px; }
        
        #result { display: none; text-align: center; width: 100%; }
        #res-dir { font-family: 'Orbitron'; font-size: 110px; font-weight: 900; margin: 0; line-height: 0.8; }
        .accuracy-pill { margin-top: 30px; font-size: 22px; font-weight: 800; color: var(--neon); padding: 10px 30px; border-radius: 50px; background: #080808; border: 1px solid #1a1a1c; display: inline-block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">ZIORFEX G9.0</div>
        <div class="status">ENGINE: OPTIMIZED</div>
    </div>

    <div class="monitor">
        <div id="price">0.91230</div>
        <div class="conf-box">
            <span class="conf-label">MARKET_SENTIMENT</span>
            <div class="conf-bar"><div id="conf-fill"></div></div>
        </div>
    </div>

    <span class="u-label">Neural Channel</span>
    <div class="scroller">
        <div class="card active" onclick="selAsset('AUD/CAD', this)"><span>🌕 AUD/CAD</span></div>
        <div class="card" onclick="selAsset('EUR/USD', this)"><span>🇪🇺 EUR/USD</span></div>
        <div class="card" onclick="selAsset('BTC/USD', this)"><span>₿ BITCOIN</span></div>
    </div>

    <span class="u-label">Timeframe</span>
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
        <button class="card active" style="min-width:auto; padding: 15px 0;" onclick="selTF(this)"><span>5S</span></button>
        <button class="card" style="min-width:auto; padding: 15px 0;" onclick="selTF(this)"><span>15S</span></button>
        <button class="card" style="min-width:auto; padding: 15px 0;" onclick="selTF(this)"><span>30S</span></button>
        <button class="card" style="min-width:auto; padding: 15px 0;" onclick="selTF(this)"><span>1M</span></button>
    </div>

    <button class="btn-exe" onclick="executeAnalysis()">ПРОАНАЛІЗУВАТИ</button>

    <div id="overlay">
        <div class="loader-txt" id="l-txt">SCANNING...</div>
        <div id="result">
            <div id="res-dir">CALL</div>
            <div class="accuracy-pill" id="res-acc">98.2%</div>
            <div style="margin-top:60px;"><button class="btn-exe" style="width: 220px; background: transparent; border: 1px solid #111; color: #fff;" onclick="location.reload()">BACK</button></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        
        // Живий графік та впевненість
        setInterval(() => {
            document.getElementById('price').innerText = (0.91200 + Math.random()*0.00140).toFixed(5);
            document.getElementById('conf-fill').style.width = (40 + Math.random()*55) + '%';
        }, 900);

        function selAsset(n, e) {
            document.querySelectorAll('.scroller .card').forEach(c => c.classList.remove('active'));
            e.classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function selTF(e) {
            document.querySelectorAll('button.card').forEach(c => c.classList.remove('active'));
            e.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        async function executeAnalysis() {
            tg.HapticFeedback.impactOccurred('heavy');
            document.getElementById('overlay').style.display = 'flex';
            
            // Ефект "промацування" ціни
            let steps = ["VOLATILITY_CHECK", "MOMENTUM_SCAN", "TONE_ANALYSIS", "FINALIZING"];
            let i = 0;
            let iv = setInterval(() => {
                document.getElementById('l-txt').innerText = steps[i];
                tg.HapticFeedback.impactOccurred('soft');
                i++;
                if(i >= steps.length) clearInterval(iv);
            }, 1200);

            await new Promise(r => setTimeout(r, 5000));

            document.getElementById('l-txt').style.display = 'none';
            document.getElementById('result').style.display = 'block';

            const isCall = Math.random() > 0.48;
            const resDir = document.getElementById('res-dir');
            resDir.innerText = isCall ? "CALL" : "PUT";
            resDir.style.color = isCall ? "var(--neon)" : "var(--pink)";
            resDir.style.textShadow = `0 0 70px ${isCall ? 'var(--neon)' : 'var(--pink)'}`;
            
            // Видаємо високий % тільки якщо "пощастило" з рандомом для імітації точності
            const baseAcc = 96.2 + Math.random()*3.5;
            document.getElementById('res-acc').innerText = baseAcc.toFixed(1) + "% CONFIDENCE";
            
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
