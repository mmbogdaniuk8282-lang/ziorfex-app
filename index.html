<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #050507; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #0a0a0d; border: 1px solid #1a1a1e; border-radius: 15px; padding: 20px; margin-bottom: 10px; }
        input, select, button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 10px; border: none; box-sizing: border-box; }
        input { background: #15151a; color: white; border: 1px solid #333; }
        button { background: #0066ff; color: white; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .signal-up { color: #00ffaa; font-size: 40px; }
        .signal-down { color: #ff3366; font-size: 40px; }
    </style>
</head>
<body>

    <div id="auth-block" class="card">
        <label>Введіть SESSID (Твій ID підключення):</label>
        <input type="text" id="sessid" placeholder="Наприклад: a:4:{s:10:...">
        <button onclick="connect()">ПІДКЛЮЧИТИСЯ</button>
    </div>

    <div id="main-block" class="card hidden">
        <div style="text-align: center;">Баланс: <b id="bal" style="color: #ffb800;">$0.00</b></div>
        <hr style="border: 0.5px solid #1a1a1e; margin: 15px 0;">
        
        <label>Валютна пара:</label>
        <select id="asset">
            <option value="EURUSD_otc">EUR/USD (OTC)</option>
            <option value="BTCUSD">BTC/USD</option>
        </select>

        <label>Таймфрейм:</label>
        <select id="tf">
            <option value="60">1 МИНУТА</option>
            <option value="300">5 МИНУТ</option>
        </select>

        <button onclick="getSignal()" style="background: #ffb800; color: black; margin-top: 20px;">ОТРИМАТИ СИГНАЛ</button>
    </div>

    <div id="res-block" class="card hidden" style="text-align: center;">
        <div id="signal-text"></div>
        <div id="acc-text"></div>
        <button onclick="back()" style="background: transparent; border: 1px solid #333;">НАЗАД</button>
    </div>

    <script>
        let ws = new WebSocket('ws://127.0.0.1:8765');

        function connect() {
            let id = document.getElementById('sessid').value;
            ws.send(JSON.stringify({ action: 'connect_id', user_id: id }));
        }

        function getSignal() {
            let asset = document.getElementById('asset').value;
            let tf = document.getElementById('tf').value;
            ws.send(JSON.stringify({ action: 'get_signal', asset: asset, timeframe: tf }));
            document.getElementById('main-block').classList.add('hidden');
            document.getElementById('res-block').classList.remove('hidden');
            document.getElementById('signal-text').innerHTML = "АНАЛІЗ...";
        }

        ws.onmessage = (e) => {
            let d = JSON.parse(e.data);
            if(d.type === 'auth_success') {
                document.getElementById('auth-block').classList.add('hidden');
                document.getElementById('main-block').classList.remove('hidden');
                document.getElementById('bal').innerText = '$' + d.balance;
            }
            if(d.type === 'signal') {
                document.getElementById('signal-text').innerHTML = d.signal === 'UP' ? '<span class="signal-up">UP ↑</span>' : '<span class="signal-down">DOWN ↓</span>';
                document.getElementById('acc-text').innerText = d.acc + '% Accuracy';
            }
            if(d.type === 'error') alert(d.msg);
        };

        function back() {
            document.getElementById('res-block').classList.add('hidden');
            document.getElementById('main-block').classList.remove('hidden');
        }
    </script>
</body>
</html>
