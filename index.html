<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #050507; color: white; font-family: sans-serif; padding: 15px; }
        .card { background: #0a0a0d; border: 1px solid #1a1a1e; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .label { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        input, select, button { width: 100%; padding: 15px; border-radius: 12px; border: none; margin-top: 5px; box-sizing: border-box; font-family: inherit; }
        input, select { background: #111; color: white; border: 1px solid #1a1a1e; outline: none; }
        .btn-main { background: #0066ff; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .balance { font-size: 34px; font-weight: bold; color: #ffb800; text-align: center; margin: 10px 0; }
        .hidden { display: none; }
        
        /* Signal Overlay */
        #sig-overlay { display: none; position: fixed; inset: 0; background: #050507; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .sig-val { font-size: 80px; font-weight: 900; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="auth-screen" class="card">
        <div class="label">Enter SESSID to sync balance & assets</div>
        <input type="text" id="sessid-input" placeholder="a:4:{s:10:...">
        <button class="btn-main" style="margin-top: 15px;" onclick="login()">Sync Account</button>
    </div>

    <div id="main-screen" class="hidden">
        <div class="card">
            <div class="label">Real Account Balance</div>
            <div id="bal" class="balance">$0.00</div>
            <div style="text-align: center; font-size: 9px; color: #00ffaa;">CONNECTED TO ID: 126750131</div>
        </div>

        <div class="card">
            <div class="label">Asset (Parsed from Pocket)</div>
            <select id="asset-list"></select>

            <div class="label" style="margin-top: 15px;">Timeframe</div>
            <select id="tf-list">
                <option value="1m">1 MINUTE</option>
                <option value="3m">3 MINUTES</option>
                <option value="5m">5 MINUTES</option>
                <option value="15m">15 MINUTES</option>
                <option value="30m">30 MINUTES</option>
            </select>
        </div>
        <button class="btn-main" onclick="getSignal()">Get Signal</button>
    </div>

    <div id="sig-overlay">
        <div class="label" id="sig-info"></div>
        <div id="sig-res" class="sig-val"></div>
        <div id="sig-acc" style="color: #00ffaa; font-weight: bold;"></div>
        <button class="btn-main" style="width: 200px; background: transparent; border: 1px solid #222; margin-top: 40px;" onclick="closeSig()">Back</button>
    </div>

    <script>
        let ws = new WebSocket('ws://127.0.0.1:8765');

        function login() {
            let sid = document.getElementById('sessid-input').value;
            ws.send(JSON.stringify({ action: 'login', sessid: sid }));
        }

        ws.onmessage = (e) => {
            let d = JSON.parse(e.data);
            if(d.type === 'login_res' && d.success) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-screen').classList.remove('hidden');
                document.getElementById('bal').innerText = '$' + d.balance;

                // Заповнюємо список валют тими, що реально є на акку
                let sel = document.getElementById('asset-list');
                sel.innerHTML = '';
                d.assets.forEach(a => {
                    let o = document.createElement('option');
                    o.value = a; o.innerText = a.toUpperCase().replace('_OTC', ' (OTC)');
                    sel.appendChild(o);
                });
            }
            if(d.type === 'signal') {
                document.getElementById('sig-info').innerText = d.asset.toUpperCase() + " | " + d.tf.toUpperCase();
                document.getElementById('sig-res').innerText = d.signal === 'UP' ? 'UP ↑' : 'DOWN ↓';
                document.getElementById('sig-res').style.color = d.signal === 'UP' ? '#00ffaa' : '#ff3366';
                document.getElementById('sig-acc').innerText = d.acc + '% ACCURACY';
            }
        };

        function getSignal() {
            let asset = document.getElementById('asset-list').value;
            let tf = document.getElementById('tf-list').value;
            document.getElementById('sig-overlay').style.display = 'flex';
            ws.send(JSON.stringify({ action: 'get_signal', asset: asset, timeframe: tf }));
        }

        function closeSig() { document.getElementById('sig-overlay').style.display = 'none'; }
    </script>
</body>
</html>
