<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZIORFEX MULTIVERSE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700&display=swap');
        
        :root { /* Dark Theme (Default) */
            --bg: #050505; --card: #0f0f0f; --text: #ffffff; --accent: #00ff88;
            --sub: #555; --border: #1a1a1a;
        }

        [data-theme="light"] {
            --bg: #f5f5f7; --card: #ffffff; --text: #000000; --accent: #007bff;
            --sub: #888; --border: #e0e0e0;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
            margin: 0; padding: 15px; transition: 0.3s; height: 100vh; display: flex; flex-direction: column;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 14px; color: var(--accent); }
        
        /* Theme Toggle */
        .theme-btn { 
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 8px 12px; border-radius: 10px; font-size: 10px; cursor: pointer;
        }

        .main-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 24px;
            padding: 25px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        #price { font-family: 'Orbitron'; font-size: 42px; font-weight: 900; margin: 10px 0; letter-spacing: -1px; }

        .btn-action {
            width: 100%; background: var(--accent); color: #000; border: none;
            padding: 22px; border-radius: 18px; font-family: 'Orbitron'; font-weight: 900;
            font-size: 16px; margin-top: auto; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Overlay */
        #overlay {
            display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
        }
        
        .pulse { width: 80px; height: 80px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; opacity: 0.2; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body data-theme="dark">

    <div class="header">
        <div class="logo">ZIORFEX v27</div>
        <button class="theme-btn" onclick="toggleTheme()">🌓 THEME</button>
    </div>

    <div class="main-card">
        <div id="asset-label" style="font-size: 10px; color: var(--sub); letter-spacing: 2px;">AUD/CAD (OTC)</div>
        <div id="price">0.00000</div>
        <div id="algo-status" style="font-size: 9px; color: var(--accent);">● HFT_ENGINE_ACTIVE</div>
    </div>

    <div style="margin-top: 20px;">
        <label style="font-size: 10px; color: var(--sub);">ASSET SELECTION</label>
        <div style="background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-top: 5px;">
            <select id="asset" style="width: 100%; background: transparent; border: none; color: var(--text); font-weight: 700;">
                <option value="AUD/CAD (OTC)">AUD/CAD (OTC)</option>
                <option value="EUR/USD (OTC)">EUR/USD (OTC)</option>
                <option value="BTC/USDT">BITCOIN</option>
            </select>
        </div>
    </div>

    <button class="btn-action" onclick="getSignal()">GENERATE SIGNAL</button>

    <div id="overlay">
        <div class="pulse"></div>
        <div id="status" style="margin-top: 20px; font-family: 'Orbitron'; font-size: 12px; color: var(--accent);">SCANNING...</div>
        
        <div id="res" style="display: none; text-align: center;">
            <div id="dir" style="font-family: 'Orbitron'; font-size: 60px; font-weight: 900;">CALL</div>
            <div id="acc" style="font-size: 20px; color: var(--accent); font-weight: 700;">ACCURACY: 98%</div>
            <button class="btn-action" style="background: transparent; border: 1px solid var(--border); color: var(--text); margin-top: 30px;" onclick="location.reload()">BACK</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
            tg.HapticFeedback.impactOccurred('light');
        }

        // Live Price
        setInterval(() => {
            let p = (Math.random() * 0.0005 + 0.91200).toFixed(5);
            document.getElementById('price').innerText = p;
        }, 1000);

        async function getSignal() {
            tg.HapticFeedback.impactOccurred('heavy');
            document.getElementById('overlay').style.display = 'flex';
            
            const steps = ["CONNECTING...", "MICRO-TREND ANALYSIS...", "LIQUIDITY CHECK...", "FINALIZING..."];
            for(let s of steps) {
                document.getElementById('status').innerText = s;
                await new Promise(r => setTimeout(r, 1000));
            }

            document.getElementById('status').style.display = 'none';
            document.getElementById('pulse').style.display = 'none'; // fix if needed
            const res = document.getElementById('res');
            res.style.display = 'block';

            const isCall = Math.random() > 0.5;
            const d = document.getElementById('dir');
            d.innerText = isCall ? "CALL ↑" : "PUT ↓";
            d.style.color = isCall ? "#00ff88" : "#ff3b3b";
            
            document.getElementById('acc').innerText = `ACCURACY: ${(94 + Math.random() * 5).toFixed(1)}%`;
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
