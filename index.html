<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ziorfex Quantum</title>
    <style>
        body { margin: 0; background: #050507; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .balance-card { background: #0a0a0d; border: 1px solid #1a1a1e; border-radius: 20px; padding: 30px; text-align: center; }
        .label { font-size: 8px; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .value { font-size: 38px; font-weight: bold; color: #ffb800; margin-bottom: 15px; }
        .status { font-size: 9px; padding: 5px 15px; border-radius: 20px; background: rgba(0,255,170,0.1); color: #00ffaa; border: 1px solid #00ffaa33; display: inline-block; }
        .asset-card { background: #0a0a0d; border: 1px solid #1a1a1e; border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .asset-name { font-weight: bold; font-size: 14px; }
        .algo { font-size: 9px; color: #444; margin-top: 5px; }
        .percent { color: #0066ff; font-weight: bold; }
        .btn { background: #0066ff; color: white; border: none; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 16px; width: 100%; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        
        /* Екран сигналу */
        #signal-screen { display: none; position: fixed; inset: 0; background: #050507; z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .signal-val { font-size: 80px; font-weight: 900; margin: 20px 0; }
        .acc { color: #00ffaa; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>
    <div style="text-align: center; font-weight: bold; font-size: 14px; color: #444;">Ziorfex Trade Bot</div>

    <div class="balance-card">
        <div class="label">Real Pocket Balance</div>
        <div id="balance" class="value">$2,975.53</div>
        <div id="status" class="status">LIVE CONNECTION</div>
    </div>

    <div class="asset-card">
        <div>
            <div class="asset-name">EUR/USD (OTC)</div>
            <div class="algo">ALGORITHM: QUANTUM V3</div>
        </div>
        <div class="percent">98.9%</div>
    </div>

    <button class="btn" onclick="getSignal()">Get Signal</button>

    <div id="signal-screen">
        <div class="label" style="font-size: 12px;">Analyzing Market...</div>
        <div id="res" class="signal-val">...</div>
        <div id="accuracy" class="acc"></div>
        <button class="btn" style="background: transparent; border: 1px solid #1a1a1e; margin-top: 40px; width: 200px;" onclick="closeSignal()">Back</button>
    </div>

    <script>
        let ws = new WebSocket('ws://127.0.0.1:8765');
        
        ws.onmessage = (e) => {
            let data = JSON.parse(e.data);
            if(data.type === 'auth') document.getElementById('balance').innerText = '$' + data.balance;
            if(data.type === 'signal') {
                document.getElementById('res').innerText = data.signal === 'UP' ? 'UP ↑' : 'DOWN ↓';
                document.getElementById('res').style.color = data.signal === 'UP' ? '#00ffaa' : '#ff3366';
                document.getElementById('accuracy').innerText = data.acc + '% ACCURACY';
            }
        };

        function getSignal() {
            document.getElementById('signal-screen').style.display = 'flex';
            document.getElementById('res').innerText = '...';
            document.getElementById('accuracy').innerText = '';
            ws.send(JSON.stringify({action: 'get_signal'}));
        }

        function closeSignal() { document.getElementById('signal-screen').style.display = 'none'; }
    </script>
</body>
</html>
