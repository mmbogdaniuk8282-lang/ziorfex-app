<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZIORFEX HYPER-PRECISION</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap');

        :root {
            --neon: #00ff88; --bg: #030303; --panel: #0d0d0d;
            --border: rgba(0, 255, 136, 0.15); --red: #ff3b3b; --gold: #ffd700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #fff; 
            margin: 0; padding: 12px; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #0a1a10 0%, #030303 100%);
        }

        /* Чіткий неоновий ефект для тексту */
        .neon-text { text-shadow: 0 0 8px rgba(0, 255, 136, 0.6); }

        /* Верхня панель статусу */
        .status-bar { display: flex; justify-content: space-between; font-size: 9px; color: #444; margin-bottom: 10px; }
        .latency { color: var(--neon); animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* Головна картка ціни */
        .price-card {
            background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; text-align: center; margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,255,136,0.02);
            position: relative; overflow: hidden;
        }
        
        #asset-display { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        #live-price { font-family: 'Orbitron'; font-size: 40px; font-weight: 900; letter-spacing: -2px; transition: color 0.1s; }
        .trend-icon { font-size: 12px; margin-left: 5px; vertical-align: middle; }

        /* Блоки вводу */
        .section-label { font-size: 10px; color: var(--neon); text-transform: uppercase; margin: 10px 0 6px 6px; display: block; opacity: 0.8; }
        
        .box-input { background: var(--panel); border: 1px solid #222; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        select { width: 100%; background: transparent; border: none; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; }

        /* Таймфрейм кнопки */
        .tf-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .tf-btn {
            background: #111; border: 1px solid #222; color: #666;
            padding: 12px 0; border-radius: 10px; font-size: 11px; font-weight: 700;
            cursor: pointer; transition: 0.2s;
        }
        .tf-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0, 255, 136, 0.04); box-shadow: 0 0 10px rgba(0,255,136,0.1); }

        /* Кнопка аналізу */
        .btn-analyze {
            width: 100%; background: var(--neon); color: #000; border: none;
            padding: 20px; border-radius: 16px; font-family: 'Orbitron'; font-weight: 900;
            font-size: 17px; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 255, 136, 0.2); margin-top: auto;
            transition: transform 0.1s;
        }
        .btn-analyze:active { transform: scale(0.97); }

        /* Оверлей аналізу */
        #overlay {
            display: none; position: fixed; inset: 0; background: var(--bg);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }
        
        /* Сканер імпульсів */
        .scanner {
            width: 100px; height: 100px; border: 1px solid var(--border); border-radius: 50%;
            position: relative; overflow: hidden; margin-bottom: 20px;
        }
        .scanner-beam {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--neon); box-shadow: 0 0 15px var(--neon);
            animation: scan 2s infinite ease-in-out;
        }
        @keyframes scan { from { top: -10%; } to { top: 110%; } }

        /* Результат */
        #res-dir { font-family: 'Orbitron'; font-size: 52px; font-weight: 900; margin: 20px 0 10px; }
        #res-meta { font-size: 12px; color: #555; margin-bottom: 40px; text-align: center; }
    </style>
</head>
<body>

    <div class="status-bar">
        <div class="status-feed neon-text">POCKET FEED // LIVE</div>
        <div class="latency neon-text">MS: 18ms // CORE v25</div>
    </div>

    <div class="price-card">
        <div id="asset-display">AUD/CAD (OTC)</div>
        <div id="live-price">0.91242<span class="trend-icon" id="trend-icon">↑</span></div>
        <div style="font-size: 10px; color: #333;">PRECISION ENGINE ACTIVE</div>
    </div>

    <span class="section-label">Актив</span>
    <div class="box-input">
        <select id="asset-select" onchange="syncAsset()">
            <option value="AUD/CAD (OTC)">AUD/CAD (OTC)</option>
            <option value="EUR/USD (OTC)">EUR/USD (OTC)</option>
            <option value="GBP/USD (OTC)">GBP/USD (OTC)</option>
            <option value="BTC/USDT">BITCOIN (BINANCE)</option>
            <option value="GOLD (OTC)">GOLD (XAU/USD)</option>
        </select>
    </div>

    <span class="section-label">Таймфрейм сигналу</span>
    <div class="tf-grid">
        <button class="tf-btn" onclick="setTF(5, this)">5s</button>
        <button class="tf-btn" onclick="setTF(15, this)">15s</button>
        <button class="tf-btn active" onclick="setTF(60, this)">1m</button>
        <button class="tf-btn" onclick="setTF(300, this)">5m</button>
    </div>

    <div class="box-input" style="padding: 10px; background: rgba(255,255,255,0.02); opacity: 0.6;">
        <span class="section-label" style="margin:0 0 5px 0; font-size:9px;">Алгоритм</span>
        <div style="font-size: 12px; font-weight: 700;">HFT_NEURAL_v25.2_SCALPING</div>
    </div>

    <button class="btn-analyze" onclick="startAnalyze()">Генерувати сигнал</button>

    <div id="overlay">
        <div id="loading-box" style="text-align:center;">
            <div class="scanner"><div class="scanner-beam"></div></div>
            <p id="timer" style="margin-top:25px; color:var(--neon); font-family:'Orbitron'; font-size:12px;">ОБРОБКА ТИКІВ...</p>
        </div>
        
        <div id="result-box" style="display:none; text-align:center; width: 100%;">
            <div id="res-dir">CALL ↑</div>
            <p id="res-acc" style="color:var(--neon); font-size:18px; font-weight:700;">ТОЧНІСТЬ: 94.2%</p>
            <div id="res-meta">АСЕТ: <span id="res-as"></span> | EXPI: <span id="res-exp"></span></div>
            <button class="btn-analyze" style="width:70%; margin-top:50px; background:transparent; border:1px solid #333; color:#fff;" onclick="location.reload()">ОНОВИТИ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentTF = 60;
        let price = 1.08412;
        let lastDiff = 0;

        // Функція синхронізації асета
        function syncAsset() {
            document.getElementById('asset-display').innerText = document.getElementById('asset-select').value;
            tg.HapticFeedback.impactOccurred('medium');
        }

        // Функція вибору таймфрейму
        function setTF(val, el) {
            currentTF = val;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        // --- ЛОГІКА ЖИВОЇ ЦІНИ (імітація OTC) ---
        // Ця ціна НЕ використовується для сигналу, тільки для візуалу
        setInterval(() => {
            let change = (Math.random() * 0.00018 - 0.00009);
            price = (parseFloat(price) + change).toFixed(5);
            
            const pEl = document.getElementById('live-price');
            const iEl = document.getElementById('trend-icon');
            pEl.innerText = price;
            
            if(change > 0) {
                pEl.style.color = "#00ff88";
                iEl.innerText = "↑";
                iEl.style.color = "#00ff88";
            } else {
                pEl.style.color = "#ff3b3b";
                iEl.innerText = "↓";
                iEl.style.color = "#ff3b3b";
            }
        }, 1000);

        // --- ЛОГІКА СИГНАЛУ (HFT IMPULSE) ---
        async function startAnalyze() {
            tg.HapticFeedback.impactOccurred('heavy');
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('loading-box').style.display = 'block';
            document.getElementById('result-box').style.display = 'none';

            let count = currentTF;
            // Фіксуємо імпульс в момент натискання
            lastDiff = (Math.random() * 2 - 1); 
            
            const clock = setInterval(() => {
                count--;
                document.getElementById('timer').innerText = `CALCULATING IMPULSE: ${count}S`;
                if(count <= 0) clearInterval(clock);
            }, 1000);

            // Реально чекаємо обраний час
            await new Promise(r => setTimeout(r, currentTF * 1000));
            
            showResult();
        }

        function showResult() {
            tg.HapticFeedback.notificationOccurred('success');
            document.getElementById('loading-box').style.display = 'none';
            document.getElementById('result-box').style.display = 'block';

            const isUp = lastDiff >= 0;
            const resDir = document.getElementById('res-dir');
            
            resDir.innerText = isUp ? "CALL ↑" : "PUT ↓";
            resDir.style.color = isUp ? "#00ff88" : "#ff3b3b";
            
            // Динамічна точність від 91% до 98%
            const acc = (91 + Math.random() * 7).toFixed(1);
            document.getElementById('res-acc').innerText = `ТОЧНІСТЬ: ${acc}%`;
            
            // Мета дані
            document.getElementById('res-as').innerText = document.getElementById('asset-select').value;
            document.getElementById('res-exp').innerText = currentTF + "s";
        }
    </script>
</body>
</html>
