<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZIORFEX TERMINATOR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@500;800&display=swap');
        :root { --neon: #00ff88; --bg: #000; --red: #ff003c; --warning: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #fff; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Scanline FX */
        body::before { content: " "; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; }

        .terminal-header { display: flex; justify-content: space-between; font-size: 8px; color: var(--neon); padding: 5px; border-bottom: 1px solid rgba(0,255,136,0.2); margin-bottom: 10px; }
        .main-monitor { background: #050505; border: 1px solid #1a1a1a; border-radius: 15px; padding: 20px; position: relative; box-shadow: 0 0 20px rgba(0,0,0,1); }
        
        #live-price { font-family: 'Orbitron'; font-size: 48px; font-weight: 900; letter-spacing: -2px; text-align: center; margin: 10px 0; }
        .vol-meter { width: 100%; height: 2px; background: #111; margin-top: 10px; position: relative; }
        #vol-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--neon); width: 0%; transition: 0.3s; }

        .label { font-size: 9px; color: #444; text-transform: uppercase; margin: 15px 0 5px 5px; letter-spacing: 2px; }
        .box { background: #080808; border: 1px solid #111; border-radius: 12px; padding: 12px; }
        select { width: 100%; background: transparent; border: none; color: #fff; font-size: 14px; font-weight: 700; }

        .grid-tf { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn-tf { background: #0a0a0a; border: 1px solid #1a1a1a; color: #444; padding: 14px 0; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; }
        .btn-tf.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,136,0.05); }

        .btn-execute { width: 100%; background: var(--neon); color: #000; border: none; padding: 20px; border-radius: 15px; font-family: 'Orbitron'; font-weight: 900; font-size: 18px; text-transform: uppercase; cursor: pointer; margin-top: auto; box-shadow: 0 0 25px rgba(0,255,136,0.2); }

        #overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .console-out { font-size: 10px; color: var(--neon); width: 100%; height: 150px; overflow: hidden; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="terminal-header">
        <div>SYS: TERMINATOR_v24</div>
        <div>MARKET: AUD/CAD (OTC)</div>
    </div>

    <div class="main-monitor">
        <div id="live-price">0.91242</div>
        <div class="vol-meter"><div id="vol-fill"></div></div>
        <div style="text-align: center; font-size: 9px; color: #333; margin-top: 5px;">HFT_VOLUME_SCANNER</div>
    </div>

    <span class="label">Target Pair</span>
    <div class="box">
        <select id="asset-select" onchange="reset()">
            <option value="AUD/CAD (OTC)">AUD/CAD (OTC)</option>
            <option value="EUR/USD (OTC)">EUR/USD (OTC)</option>
            <option value="BTC/USDT">BITCOIN (IMPACT)</option>
        </select>
    </div>

    <span class="label">Time Interval</span>
    <div class="grid-tf">
        <button class="btn-tf active" onclick="setT(5, this)">5S</button>
        <button class="btn-tf" onclick="setT(15, this)">15S</button>
        <button class="btn-tf" onclick="setT(30, this)">30S</button>
        <button class="btn-tf" onclick="setT(60, this)">1M</button>
    </div>

    <button class="btn-execute" onclick="runAlgo()">АНАЛІЗУВАТИ ІМПУЛЬС</button>

    <div id="overlay">
        <div class="console-out" id="console"></div>
        <div id="status-msg" style="font-family:'Orbitron'; font-size:12px; color:var(--neon); letter-spacing:2px;">HACKING LIQUIDITY...</div>
        
        <div id="result" style="display:none; text-align:center; width:100%;">
            <div id="res-dir" style="font-family:'Orbitron'; font-size:75px; font-weight:900;">PUT ↓</div>
            <div id="res-acc" style="color:var(--neon); font-size:24px; font-weight:900;">POWER: 99.8%</div>
            <div id="res-meta" style="font-size:10px; color:#444; margin-top:30px;">SIGNAL_SOURCE: TICK_BREAKOUT</div>
            <button class="btn-execute" onclick="location.reload()" style="background:transparent; border:1px solid #222; color:#fff; margin-top:50px;">BACK</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let tf = 5; let price = 0.91242; let history = [];

        function reset() { history = []; }
        function setT(v, e) { tf = v; document.querySelectorAll('.btn-tf').forEach(b => b.classList.remove('active')); e.classList.add('active'); }

        setInterval(() => {
            let ch = (Math.random() * 0.00044 - 0.00022);
            price = (parseFloat(price) + ch).toFixed(5);
            const el = document.getElementById('live-price');
            el.innerText = price;
            el.style.color = ch > 0 ? "#00ff88" : "#ff003c";
            
            // Заповнюємо волюметр
            document.getElementById('vol-fill').style.width = Math.random() * 100 + "%";
            
            history.push(parseFloat(price));
            if(history.length > 50) history.shift();
        }, 1000);

        async function runAlgo() {
            tg.HapticFeedback.impactOccurred('heavy');
            document.getElementById('overlay').style.display = 'flex';
            const con = document.getElementById('console');
            con.innerHTML = '';
            
            const logs = [
                "> OPENING WEBSOCKET TO OTC FEED...",
                "> SCANNING MICRO-LEVELS AT 0.91240...",
                "> DETECTING FAKE BREAKOUTS...",
                "> CALCULATING HFT MOMENTUM...",
                "> CONFIRMING INSTITUTIONAL BIAS...",
                "> EXPLOIT READY."
            ];

            for(let i=0; i<logs.length; i++) {
                con.innerHTML += `<div>${logs[i]}</div>`;
                await new Promise(r => setTimeout(r, (tf * 1000) / logs.length));
            }

            // --- ЕКСТРЕМАЛЬНА ЛОГІКА V24 ---
            const current = parseFloat(price);
            const startPrice = history[history.length - 10] || history[0];
            
            // "Пастка брокера": якщо ціна за 10 сек виросла — ми беремо на розворот (PUT)
            // Бо на OTC після імпульсу майже завжди йде компенсація
            const isCall = current < startPrice; 
            
            document.getElementById('status-msg').style.display = 'none';
            document.getElementById('console').style.display = 'none';
            const res = document.getElementById('result');
            res.style.display = 'block';
            
            const dir = document.getElementById('res-dir');
            dir.innerText = isCall ? "CALL ↑" : "PUT ↓";
            dir.style.color = isCall ? "#00ff88" : "#ff003c";
            
            document.getElementById('res-acc').innerText = `ACCURACY: ${(98.5 + Math.random() * 1.4).toFixed(1)}%`;
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
