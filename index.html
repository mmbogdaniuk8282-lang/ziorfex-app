<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POCKET AI ULTIMATE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap');
        :root { --blue: #0066ff; --bg: #050507; --card: #0d0d10; --green: #00ffaa; --red: #ff3366; --gold: #ffb800; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .container { padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        
        .header { background: var(--card); border: 1px solid #1a1a1e; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .label { font-size: 9px; color: #444; letter-spacing: 3px; text-transform: uppercase; }
        #balance { font-family: 'Orbitron'; font-size: 34px; font-weight: 900; color: var(--gold); margin: 10px 0; text-shadow: 0 0 20px rgba(255,184,0,0.2); }
        
        .status-tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 8px; font-weight: 800; background: rgba(0,255,170,0.1); color: var(--green); border: 1px solid rgba(0,255,170,0.2); }

        .market-info { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #1a1a1e; margin-bottom: 20px; }
        .pair-name { font-weight: 800; font-size: 14px; }
        .accuracy-val { color: var(--blue); font-family: 'Orbitron'; font-size: 12px; }

        .btn-main { width: 100%; padding: 22px; border-radius: 18px; border: none; background: var(--blue); color: #fff; font-family: 'Orbitron'; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: auto; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,102,255,0.3); }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #sig-res { font-family: 'Orbitron'; font-size: 90px; font-weight: 900; margin: 30px 0; }
        .acc-text { color: var(--green); font-size: 20px; font-weight: 800; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="label">REAL POCKET BALANCE</div>
            <div id="balance">$0.00</div>
            <div class="status-tag" id="conn-status">WAITING CONNECTION...</div>
        </div>

        <div class="market-info">
            <div>
                <div class="pair-name">EUR/USD (OTC)</div>
                <div style="font-size: 8px; color: #444; margin-top: 4px;">ALGORITHM: QUANTUM V3</div>
            </div>
            <div class="accuracy-val" id="top-acc">98.9%</div>
        </div>

        <button class="btn-main" onclick="getSignal()">GET SIGNAL</button>
    </div>

    <div id="overlay">
        <div style="color: var(--blue); font-size: 10px; letter-spacing: 10px;">ANALYZING...</div>
        <div id="sig-res">UP</div>
        <div class="acc-text" id="sig-acc">99.1%</div>
        <button class="btn-main" style="width: 220px; background: transparent; border: 1px solid #222; margin-top: 50px;" onclick="location.reload()">BACK</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let ws;

        function initWS() {
            ws = new WebSocket('ws://localhost:8765');
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                if(d.type === 'auth' || d.type === 'balance_update') {
                    document.getElementById('balance').innerText = "$" + d.balance;
                    document.getElementById('conn-status').innerText = "LIVE CONNECTION";
                }
                if(d.type === 'signal') {
                    renderSignal(d.signal, d.acc);
                }
            };
        }

        function getSignal() {
            document.getElementById('overlay').style.display = 'flex';
            ws.send(JSON.stringify({action: 'get_signal'}));
            tg.HapticFeedback.impactOccurred('heavy');
        }

        function renderSignal(s, a) {
            const res = document.getElementById('sig-res');
            res.innerText = s === "UP" ? "UP ↑" : "DOWN ↓";
            res.style.color = s === "UP" ? "var(--green)" : "var(--red)";
            document.getElementById('sig-acc').innerText = a + "% ACCURACY";
            tg.HapticFeedback.notificationOccurred('success');
        }

        initWS();
    </script>
</body>
</html>
