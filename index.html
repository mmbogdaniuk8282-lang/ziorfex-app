<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZIORFEX TITAN TERMINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --neon: #00ff88; --bg: #020202; --panel: rgba(20, 20, 20, 0.7);
            --border: rgba(0, 255, 136, 0.15); --red: #ff3e3e; --gold: #ffcc00;
        }

        .theme-red { --neon: #ff3e3e; --border: rgba(255, 62, 62, 0.15); }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #fff; 
            margin: 0; padding: 15px; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; z-index: 10; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--neon); letter-spacing: 2px; text-shadow: 0 0 15px var(--neon); }
        
        .status-dot { width: 8px; height: 8px; background: var(--neon); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px var(--neon); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .card { 
            background: var(--panel); border: 1px solid var(--border); border-radius: 20px; 
            padding: 18px; margin-bottom: 12px; backdrop-filter: blur(15px);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.02);
        }

        .label { font-size: 0.6rem; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; font-weight: bold; }

        .switcher { display: flex; gap: 8px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 12px; border: 1px solid var(--border); }
        .sw-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 10px; 
            background: transparent; color: #555; font-family: inherit; font-size: 0.8rem;
            cursor: pointer; transition: 0.4s; font-weight: bold;
        }
        .sw-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        select { 
            width: 100%; background: rgba(0,0,0,0.6); border: 1px solid var(--border); 
            color: #fff; padding: 14px; border-radius: 12px; font-family: inherit; font-size: 0.95rem;
        }

        .volatility-box { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .vol-bar { flex-grow: 1; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
        .vol-fill { height: 100%; background: var(--neon); width: 65%; transition: 0.5s; }

        .glow-btn { 
            width: 100%; background: var(--neon); color: #000; border: none; 
            padding: 20px; border-radius: 18px; font-family: 'Orbitron', sans-serif;
            font-weight: 900; font-size: 1rem; text-transform: uppercase;
            margin-top: auto; cursor: pointer; transition: 0.2s;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        }
        .glow-btn:active { transform: scale(0.97); }

        #analysis-screen { display: none; flex-direction: column; height: 100%; }
        .console { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--border); border-radius: 15px; 
            padding: 20px; flex-grow: 1; font-size: 0.75rem; color: var(--neon);
            overflow: hidden; line-height: 1.6;
        }

        #result-screen { display: none; text-align: center; }
        .result-circle {
            width: 220px; height: 220px; border-radius: 50%; border: 2px dashed var(--neon);
            margin: 20px auto; display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: radial-gradient(circle, rgba(0,255,136,0.05) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .inner-content { transform: rotate(-360deg); animation: rotate-reverse 20s linear infinite; }
        @keyframes rotate-reverse { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

        .res-dir { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 900; }
        .res-acc { font-size: 0.8rem; color: var(--neon); margin-top: 5px; letter-spacing: 1px; }

        .progress-container { width: 100%; height: 6px; background: #111; border-radius: 10px; margin: 25px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 100%; background: var(--neon); box-shadow: 0 0 15px var(--neon); }

    </style>
</head>
<body id="body">
    <canvas id="matrix"></canvas>

    <div class="header">
        <div class="logo">ZIORFEX_TITAN</div>
        <div style="font-size: 0.7rem; color: #888;"><span class="status-dot"></span>SYS_READY</div>
    </div>

    <div id="setup-screen" style="display: flex; flex-direction: column; height: 85%;">
        <div class="card">
            <div class="label">Exchange Mode</div>
            <div class="switcher">
                <button class="sw-btn active" id="std-mode" onclick="setMode('std')">STANDARD</button>
                <button class="sw-btn" id="otc-mode" onclick="setMode('otc')">OTC_TITAN</button>
            </div>
        </div>

        <div class="card">
            <div class="label">Market Instrument</div>
            <select id="pairs" onchange="updateVol()"></select>
            <div class="volatility-box">
                <span style="font-size: 0.6rem; color: #555;">VOLATILITY</span>
                <div class="vol-bar"><div class="vol-fill" id="vol-fill"></div></div>
            </div>
        </div>

        <div class="card">
            <div class="label">Timeframe Analyze</div>
            <select id="time">
                <option value="1">1 MIN (ULTRA SCALP)</option>
                <option value="3">3 MIN (NEURAL GRID)</option>
                <option value="5">5 MIN (TITAN STABLE)</option>
            </select>
        </div>

        <button class="glow-btn" onclick="startNeural()">ANALYZE MARKET</button>
    </div>

    <div id="analysis-screen">
        <div class="console" id="logs"></div>
    </div>

    <div id="result-screen">
        <div style="font-family: 'Orbitron'; font-size: 1.5rem; color: #fff;" id="res-pair">EUR/USD</div>
        <div class="result-circle" id="circle">
            <div class="inner-content">
                <div id="res-arrow" style="font-size: 3.5rem;">↑</div>
                <div class="res-dir" id="res-dir">CALL</div>
                <div class="res-acc" id="res-acc">ACCURACY: 98%</div>
            </div>
        </div>
        
        <div class="card" style="background: transparent; border: none;">
            <div class="label" id="res-time-label">SIGNAL ACTIVE: 1 MIN</div>
            <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
        </div>

        <button class="glow-btn" style="background: transparent; border: 1px solid var(--border); color: #fff;" onclick="location.reload()">ABORT SIGNAL</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const assets = {
            std: ["EUR/USD", "GBP/USD", "USD/JPY", "AUD/USD", "AUD/CAD", "BTC/USD", "ETH/USD", "XAU/USD"],
            otc: ["EUR/USD (OTC)", "GBP/USD (OTC)", "USD/JPY (OTC)", "AUD/CAD (OTC)", "NZD/USD (OTC)", "Apple (OTC)", "Gold (OTC)"]
        };

        // Matrix Background
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "0101010101010101"; const fontSize = 14;
        const columns = canvas.width / fontSize; const drops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--neon');
            ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        function setMode(m) {
            document.querySelectorAll('.sw-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(m + '-mode').classList.add('active');
            const s = document.getElementById('pairs'); s.innerHTML = '';
            assets[m].forEach(p => s.innerHTML += `<option value="${p}">${p}</option>`);
            updateVol();
        }
        setMode('std');

        function updateVol() {
            document.getElementById('vol-fill').style.width = Math.floor(40 + Math.random() * 55) + "%";
        }

        async function startNeural() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('analysis-screen').style.display = 'flex';
            const logBox = document.getElementById('logs');
            const lines = [
                "> INITIALIZING TITAN_V5 CORE...",
                "> SCANNING LIQUIDITY POOLS...",
                "> CALCULATING FIBONACCI LEVELS...",
                "> DETECTING INSTITUTIONAL ORDER BLOCKS...",
                "> ANALYZING VOLATILITY INDEX...",
                "> SIGNAL GENERATED SUCCESSFULLY."
            ];
            for (let l of lines) {
                logBox.innerHTML += `<div style="margin-bottom:10px;">${l}</div>`;
                await new Promise(r => setTimeout(r, 450));
            }
            showResult();
        }

        function showResult() {
            tg.HapticFeedback.notificationOccurred('success');
            // Sound effect
            const audio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
            audio.play().catch(() => {});

            document.getElementById('analysis-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';

            const pair = document.getElementById('pairs').value;
            const time = document.getElementById('time').value;
            const isUp = Math.random() > 0.5;
            const acc = (93 + Math.random() * 6).toFixed(1);

            document.getElementById('res-pair').innerText = pair;
            document.getElementById('res-acc').innerText = `CONFIDENCE: ${acc}%`;
            document.getElementById('res-time-label').innerText = `SIGNAL ACTIVE: ${time} MIN`;
            
            const dir = document.getElementById('res-dir');
            const arrow = document.getElementById('res-arrow');
            const circle = document.getElementById('circle');

            if(isUp) {
                dir.innerText = "CALL"; arrow.innerText = "↑";
                document.documentElement.style.setProperty('--neon', '#00ff88');
            } else {
                dir.innerText = "PUT"; arrow.innerText = "↓";
                document.documentElement.style.setProperty('--neon', '#ff3e3e');
            }

            const bar = document.getElementById('p-bar');
            bar.style.width = '100%'; bar.style.transition = 'none';
            setTimeout(() => {
                bar.style.transition = `width ${time * 60}s linear`;
                bar.style.width = '0%';
            }, 100);
        }
    </script>
</body>
</html>
